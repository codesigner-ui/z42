name: xtask-bootstrap-artifact
description: >
  C#-free bootstrap by CONSUMING the `toolchain-<host-os>` artifact produced by the
  toolchain-bootstrap job (z42c dist + stdlib dist + xtask.zpkg, all built without
  dotnet), plus a host `cargo build` for z42vm + native cdylibs. After this, drive
  work via `z42vm artifacts/xtask/xtask.zpkg -- <cmd>` exactly like the source/download
  bootstraps — but with NO dotnet. Replaces xtask-bootstrap-source on the package /
  platform-test jobs. The consuming job MUST `needs: toolchain-bootstrap`.
  Linux + macOS host runners (the toolchain artifact is per host OS).
runs:
  using: composite
  steps:
    # z42vm + native cdylibs (libz42, libz42_compression, …) — host-matched, fresh.
    # cargo's target-dir is artifacts/build/runtime, so this lands z42vm at the
    # standard artifacts/build/runtime/release/z42vm the zpkg artifact expects.
    - name: cargo build z42vm + native libs (release)
      shell: bash
      run: cargo build --locked --release --manifest-path src/runtime/Cargo.toml

    # z42c + stdlib + xtask.zpkg (C#-free .zpkg products) → restored at repo root
    # under artifacts/build/{libraries,z42c}/ and artifacts/xtask/.
    - name: Download C#-free toolchain artifact
      uses: actions/download-artifact@v4
      with:
        name: toolchain-${{ runner.os == 'macOS' && 'macos-15' || 'ubuntu-latest' }}
        path: .
