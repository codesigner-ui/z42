name: xtask-bootstrap-source
description: >
  Bootstrap the native z42 dev CLI (xtask) FROM CURRENT SOURCE — build the
  compiler (slnx) + release z42vm + a primer stdlib, compile xtask.zpkg, then run
  `xtask build stdlib` for the final flat dist + index.json. After this, drive work
  via `z42vm artifacts/xtask/xtask.zpkg -- <cmd>` (host z42vm at
  artifacts/build/runtime/release/z42vm).
  This is the SOURCE bootstrap (distinct from xtask-bootstrap which DOWNLOADS the
  prebuilt nightly). The publish-nightly path + the package jobs MUST use THIS one
  — never the download composite — so they never depend on a prior nightly
  (preserves the publish-nightly self-heal invariant; see version-bumping docs).
runs:
  using: composite
  steps:
    - name: Bootstrap xtask from source (compiler + runtime + stdlib + xtask.zpkg)
      shell: bash
      run: |
        set -euo pipefail
        dotnet build src/compiler/z42.slnx --nologo -v quiet
        cargo build --locked --release --manifest-path src/runtime/Cargo.toml
        libs="$PWD/artifacts/build/libraries/dist/release"
        # PRIMER (raw, no z42 program — the cold-bootstrap breaker): the C# compiler
        # builds the stdlib workspace from source so xtask can COMPILE (its
        # `using Std.*`). xtask compiles+runs fine without index.json (z42c reads
        # .zsym; the VM scans the flat dir) — that is regenerated by `build stdlib`.
        if [ ! -f "$libs/z42.core.zpkg" ]; then
          ( cd src/libraries && dotnet run --project ../compiler/z42.Driver --verbosity quiet -- build --workspace --release )
          mkdir -p "$libs"
          for d in artifacts/build/libraries/*/release/dist; do
            cp -f "$d"/*.zpkg "$d"/*.zsym "$libs/" 2>/dev/null || true
          done
        fi
        Z42_LIBS="$libs" dotnet run --project src/compiler/z42.Driver --verbosity quiet -- build scripts/xtask.z42.toml --release
        # build-stdlib logic is now folded into xtask (xtask_stdlib.z42): re-run the
        # workspace build (cached) + assemble the flat view + write index.json.
        vm="$PWD/artifacts/build/runtime/release/z42vm"; [ -f "$vm.exe" ] && vm="$vm.exe"
        Z42_LIBS="$libs" Z42_PORTABLE_VM="$vm" "$vm" artifacts/xtask/xtask.zpkg -- build stdlib
