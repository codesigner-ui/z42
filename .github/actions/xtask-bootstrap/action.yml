name: xtask-bootstrap
description: >
  Bootstrap the native z42 dev CLI for CI. DOWNLOAD the prebuilt nightly z42
  (install-z42 → .z42/) and compile xtask.zpkg against the DOWNLOADED stdlib
  (.z42/libs) — no stdlib rebuild from source. xtask is then run via
  `.z42/z42 artifacts/xtask/xtask.zpkg <cmd>`: the downloaded z42vm runs xtask;
  xtask itself builds + tests the CURRENT source.
  z42c's BuildLibsDirs honors Z42_LIBS as a fallback compile-time search path, so
  the prebuilt .z42/libs satisfies xtask's `using Std.*` without building stdlib —
  and xtask.zpkg's compile-time stdlib then matches the nightly stdlib it runs on.
  Linux/macOS only (install-z42.sh).
  NOTE: xtask.z42 must only use stdlib APIs present in the prebuilt nightly; a
  commit that makes xtask depend on a brand-new stdlib API (or bumps zbc/zpkg)
  needs a compatible nightly published first (see version-bumping docs).
runs:
  using: composite
  steps:
    - name: Download prebuilt z42 (install-z42) to run xtask
      shell: bash
      run: bash scripts/install-z42.sh

    - name: Compile xtask.zpkg with the downloaded native z42c (.z42/bin/z42c)
      shell: bash
      run: |
        set -euo pipefail
        # remove-dotnet: compile xtask via the DOWNLOADED native z42c apphost
        # (.z42/bin/z42c, shipped by install-z42) — no dotnet, no src/compiler. z42c's
        # BuildLibsDirs honors Z42_LIBS as a fallback search path, so the downloaded
        # prebuilt stdlib satisfies xtask's `using Std.*` without rebuilding it.
        z42c=".z42/bin/z42c"; [ -f "$z42c.exe" ] && z42c="$z42c.exe"
        Z42_LIBS="$PWD/.z42/libs" "$z42c" build scripts/xtask.z42.toml --release
