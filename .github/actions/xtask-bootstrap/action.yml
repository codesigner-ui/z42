name: xtask-bootstrap
description: >
  Bootstrap the native z42 dev CLI by DOWNLOADING the prebuilt nightly z42
  (install-z42 → .z42/) and compiling xtask.zpkg against its bundled stdlib.
  After this, run work via `.z42/z42 artifacts/xtask/xtask.zpkg <command>` — the
  downloaded z42vm runs xtask; xtask then builds + tests the current source.
  Linux/macOS only (install-z42.sh; Windows would use install-z42.bat).
  NOTE (zbc strict-pin): on a commit that bumps the zbc/zpkg version, the
  prebuilt nightly z42vm can't run the freshly-compiled xtask.zpkg — publish a
  compatible nightly first (see docs/.../version-bumping.md).
runs:
  using: composite
  steps:
    - name: Download prebuilt z42 (install-z42)
      shell: bash
      run: bash scripts/install-z42.sh

    - name: Compile xtask.zpkg (z42c + downloaded stdlib)
      shell: bash
      run: |
        set -euo pipefail
        Z42_LIBS="$PWD/.z42/libs" dotnet run --project src/compiler/z42.Driver --verbosity quiet -- build scripts/xtask.z42.toml --release
