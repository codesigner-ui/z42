name: Deploy book to GitHub Pages

# 每次 push 到 main 且改动了 docs/book/ 时，构建 mdBook 并发布到 GitHub Pages。
# 一次性前置：仓库 Settings → Pages → Source 选 "GitHub Actions"。
# 发布后网址：https://codesigner-ui.github.io/z42/

on:
  push:
    branches: [main]
    paths:
      - 'docs/book/**'
      - '.github/workflows/deploy-book.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发部署；不打断进行中的发布
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          MDBOOK_VERSION=0.4.40
          mkdir -p "$HOME/.local/bin"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build
        run: cd docs/book && mdbook build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
