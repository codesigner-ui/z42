name: Bench Baseline Update

# Trigger: every push (including merges) to main.
# Runs the full e2e bench and publishes the result JSON to the dedicated
# `bench-baselines` branch. PR-side workflows (P1.D.4) will fetch the latest
# baseline from there to run auto-diff.
#
# Concurrency: only one update at a time per branch (later runs cancel earlier).

on:
  push:
    branches: [main]

permissions:
  # Required to push to the bench-baselines branch.
  contents: write

concurrency:
  group: bench-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-baseline:
    name: update bench baseline (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so we can switch to bench-baselines branch.
          fetch-depth: 0

      - name: Install just
        uses: extractions/setup-just@v2
        with:
          just-version: '1.50.0'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install hyperfine
        run: |
          wget -q https://github.com/sharkdp/hyperfine/releases/download/v1.20.0/hyperfine_1.20.0_amd64.deb
          sudo dpkg -i hyperfine_1.20.0_amd64.deb

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Run full e2e bench
        run: just bench-e2e

      - name: Publish baseline to bench-baselines branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Save current baseline aside before switching branches.
          cp bench/results/e2e.json /tmp/baseline.json

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Try to fetch existing bench-baselines; create if absent.
          if git fetch origin bench-baselines:bench-baselines 2>/dev/null; then
            echo "→ Switching to existing bench-baselines branch"
            git checkout bench-baselines
          else
            echo "→ bench-baselines branch absent, bootstrapping"
            git checkout --orphan bench-baselines
            git rm -rf . 2>/dev/null || true
            cat > README.md <<'EOF'
          # Bench Baselines

          Auto-published by `.github/workflows/bench-update.yml` on every push to `main`.

          Each `baselines/<tag>.json` conforms to `bench/baseline-schema.json` (see main branch).

          PR workflows fetch from this branch to run informational regression diffs (P1.D.4).
          EOF
            git add README.md
            git commit -m "init bench-baselines branch"
          fi

          # Write/overwrite baseline for this OS-runner tag.
          mkdir -p baselines
          cp /tmp/baseline.json baselines/e2e-ubuntu-latest.json

          git add baselines/e2e-ubuntu-latest.json

          if git diff --cached --quiet; then
            echo "→ No baseline changes; skipping commit."
          else
            git commit -m "bench: update e2e-ubuntu-latest baseline (main@${GITHUB_SHA::7})"
            git push origin bench-baselines
            echo "✅ Baseline published"
          fi
