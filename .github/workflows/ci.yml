name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual trigger: force a nightly republish from the latest main WITHOUT a new
  # push. This is the escape hatch for the xtask↔nightly bootstrap cycle — after
  # a zbc/zpkg bump (or an xtask change needing a newer stdlib API), the
  # download-bootstrap jobs (vm-jit/bench) transiently fail on the OLD nightly,
  # but publish-nightly is decoupled from them (source-bootstrapped only) and
  # republishes a compatible nightly so the next run self-heals. Run via the
  # Actions "Run workflow" button or: gh workflow run CI --ref main
  workflow_dispatch:
  # Nightly full platform-test sweep — covers commits the per-push paths filter
  # skipped (z42c-only, stdlib-only, etc.). 07:00 UTC daily.
  schedule:
    - cron: '0 7 * * *'

# Cancel in-progress runs on the same ref when a new one starts
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether platform-relevant files changed, to gate the heavy
  # wasm/iOS/Android/desktop test jobs (15-25 min each). On schedule /
  # workflow_dispatch they always run (full sweep); on push/PR only when
  # platform-relevant paths change — stops the per-commit churn + the
  # cancel-in-progress storm from frequent unrelated pushes.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.filter.outputs.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            platform:
              - 'src/runtime/**'
              - 'src/toolchain/workload/**'
              - 'examples/embedding/**'
              - 'scripts/xtask_test_platform.z42'
              - 'scripts/xtask_test_wasm.z42'
              - 'scripts/xtask_test_ios.z42'
              - 'scripts/xtask_test_android.z42'
              - 'scripts/xtask_test_desktop.z42'
              - 'versions.toml'
              - '.github/workflows/ci.yml'

  build-and-test:
    name: build-and-test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # remove-dotnet-from-builds: build-and-test is fully C#-free on ALL OS — every
      # leg downloads the prev nightly's z42c seed and bootstraps from source with
      # it (no dotnet, no setup-dotnet, no NuGet). See the unified Bootstrap step.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-
            ${{ runner.os }}-cargo-

      # remove-dotnet-from-builds: ALL legs bootstrap C#-FREE — download the prev
      # published nightly's z42c-written compiler seed, then build current z42c +
      # stdlib + xtask from source with it (NO dotnet). The staged-bootstrap
      # discipline (.claude/rules/bootstrap-seed.md) guarantees the prev nightly
      # compiles current source; scripts/check-bootstrap-compat.sh is the local
      # boundary check. Logic lives in a locally-tested script (Unix verified on a
      # clean worktree producing z42c+stdlib+xtask+package, no dotnet; Windows adds
      # .zip/.exe handling — same seed contract). After this, every later step
      # drives work through `z42vm xtask.zpkg …` exactly as before.
      - name: Bootstrap C#-free (nightly z42c seed → current source)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.os }}" in
            ubuntu-latest)    rid=linux-x64 ;;
            ubuntu-24.04-arm) rid=linux-arm64 ;;
            macos-15)         rid=macos-arm64 ;;
            windows-latest)   rid=windows-x64 ;;
            *) echo "::error::unmapped os ${{ matrix.os }}"; exit 1 ;;
          esac
          bash scripts/ci-bootstrap-nocs.sh "$rid"

      # migrate-scripts-to-z42: version-drift check via xtask (replaces the
      # feature-matrix `bash scripts/check-versions-drift.sh` step). ubuntu only —
      # the check is OS-independent (versions.toml + zbc/zpkg/gradle/Package.swift
      # version constants). Reuses the from-source xtask bootstrapped above.
      - name: Check versions.toml drift (z42 xtask.zpkg deps check)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          Z42_PORTABLE_VM="$PWD/artifacts/build/runtime/release/z42vm" \
          Z42_LIBS="$PWD/artifacts/build/libraries/dist/release" \
            artifacts/build/runtime/release/z42vm artifacts/xtask/xtask.zpkg -- deps check

      # add-tests-bench-manifest-config Phase 6.1 (2026-06-06): release guard.
      # xtask's dir-mode tests / benches produce synthetic
      # `<lib>.test.<unit>.zpkg` / `<lib>.bench.<unit>.zpkg` artifacts under
      # an xtask-controlled output_dir (currently /tmp/.../xtask-testlib*/);
      # they must NEVER land in the production `dist/` tree under
      # `artifacts/build/libraries/<lib>/<profile>/`. A regression here
      # (e.g. forgotten output_dir override in a future xtask path) would
      # silently ship test scaffolding to end users via the SDK package.
      # The guard scans every per-lib dist tree and fails on the first
      # `.test.` / `.bench.` infix hit. ubuntu-only (path semantics
      # identical across platforms; one check is enough).
      - name: Release guard (no .test./.bench. zpkgs in dist/)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          # Forward: production dist/ must not contain test/bench zpkgs.
          # Excludes the per-lib tests/dist/ and bench/dist/ subdirs by
          # requiring the `/dist/` path component to NOT be preceded by
          # `/tests/` or `/bench/`.
          violators=$(
            find artifacts/build/libraries -type f \
              \( -name '*.test.*.zpkg' -o -name '*.bench.*.zpkg' \) \
              -path '*/dist/*' \
              ! -path '*/tests/dist/*' \
              ! -path '*/bench/dist/*' \
              2>/dev/null || true
          )
          if [ -n "$violators" ]; then
            echo "::error::test/bench harness zpkgs leaked into release dist/:"
            echo "$violators"
            exit 1
          fi
          echo "release guard (forward): 0 .test./.bench. zpkgs in production dist/ (OK)"

      # Reverse guard: anything inside <lib>/<profile>/tests/dist/ MUST
      # carry the `.test.` infix; same for bench/dist/. Belt-and-suspenders
      # against a future refactor that accidentally writes a production
      # zpkg into the test/bench output tree. add-tests-bench-manifest-config
      # Phase 6.1.2 (2026-06-06).
      - name: Release guard (tests/dist contents are .test. only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          # tests/dist/ must contain only `.test.` zpkgs
          tests_strangers=$(
            find artifacts/build/libraries -path '*/tests/dist/*' \
              -type f -name '*.zpkg' ! -name '*.test.*.zpkg' \
              2>/dev/null || true
          )
          # bench/dist/ must contain only `.bench.` zpkgs
          bench_strangers=$(
            find artifacts/build/libraries -path '*/bench/dist/*' \
              -type f -name '*.zpkg' ! -name '*.bench.*.zpkg' \
              2>/dev/null || true
          )
          if [ -n "$tests_strangers" ] || [ -n "$bench_strangers" ]; then
            echo "::error::non-harness zpkg appeared in tests/dist/ or bench/dist/:"
            [ -n "$tests_strangers" ] && echo "$tests_strangers"
            [ -n "$bench_strangers" ] && echo "$bench_strangers"
            exit 1
          fi
          echo "release guard (reverse): tests/dist + bench/dist contain only harness zpkgs (OK)"

      # Test on Unix runners (existing scripts are bash).
      # --parallel: wave-based stage-level concurrency (W1/W2/W3).
      # --jobs=4: intra-stage parallelism for test-lib.sh and test-vm.sh;
      #   capped at 4 to stay within the runner's vCPU budget (ubuntu=4,
      #   macos-15=3) even when two stages run concurrently in a wave.
      # migrate-scripts-to-z42: the GREEN gate now runs through the native
      # z42 build CLI (xtask) instead of test-all.sh. Bootstrap = release z42vm
      # (to run xtask.zpkg) + compile xtask.zpkg; then `xtask test all` (which
      # itself rebuilds stdlib/compiler/zbc + runs compiler+vm+cross-zpkg+stdlib,
      # parallelized via --jobs=4). z42c/stdlib from the prior steps are reused.
      - name: Test (z42 xtask.zpkg test all)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/ci-logs
          Z42_PORTABLE_VM="$PWD/artifacts/build/runtime/release/z42vm" \
          Z42_LIBS="$PWD/artifacts/build/libraries/dist/release" \
            artifacts/build/runtime/release/z42vm artifacts/xtask/xtask.zpkg -- test all 2>&1 | tee artifacts/ci-logs/test-all.log
          exit "${PIPESTATUS[0]}"

      # diag-ci-test-log-upload (2026-05-30): the wave-failed stage prints
      # `stage outputs preserved at: /tmp/...` paths that disappear when
      # the runner is recycled. Capture them as an artifact so we can
      # inspect failure mode without admin-only log access (the public
      # actions/jobs API only surfaces "exit code 1" annotations).
      - name: Upload test logs on failure
        if: failure() && matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          path: |
            artifacts/ci-logs/
            /tmp/z42-test-all.*
            /var/folders/*/*/T/z42-test-all.*
          retention-days: 7
          if-no-files-found: warn

      # Windows pre-test: regenerate golden source.zbc fixtures the same way
      # Linux/macOS do via test-vm.sh → regen-golden-tests.sh. The repo only
      # commits 6 source.zbc files; the remaining ~30 are regen-on-demand.
      # Without this step `cargo test --test zbc_compat` fails with "expected
      # ≥ 50 golden tests with source.zbc, found 6". --no-stdlib because the
      # "Build stdlib" step above already populated artifacts/build/libs/release/.
      - name: Regen golden zbc fixtures (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"; [ -f "$vm.exe" ] && vm="$vm.exe"
          # Windows: regen → _buildRuntime may cargo-relink z42vm; run xtask from a copy
          # (can't overwrite running z42vm.exe). No-op on Linux/macOS.
          runner="$vm"
          if [ "${RUNNER_OS:-}" = "Windows" ]; then
            mkdir -p "$PWD/.ci-runner"; cp "$vm" "$PWD/.ci-runner/"
            cp "$PWD"/artifacts/build/runtime/release/*.dll "$PWD/.ci-runner/" 2>/dev/null || true
            runner="$PWD/.ci-runner/$(basename "$vm")"
          fi
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$PWD/artifacts/build/libraries/dist/release" \
            "$runner" artifacts/xtask/xtask.zpkg -- regen --no-stdlib

      # Windows: Rust VM unit-test smoke (the C# dotnet-test is gone — see below).
      # RUST_MIN_STACK=8388608: Windows defaults test threads to a 1 MB stack
      # while Linux/macOS give 8 MB. Crypto/BigInt/JIT tests run on the test
      # thread itself (not spawned), and a single deep call (RSA ModPow,
      # Cranelift codegen, Blake3 Merkle recursion) exhausts 1 MB → silent
      # STATUS_ACCESS_VIOLATION (0xc0000005) on the guard page. Match the
      # other platforms' 8 MB to remove this class of cross-platform flake.
      #
      # --test-threads=1: the runtime --lib unit tests have a pre-existing
      # cross-thread memory-corruption race (reproducible on macOS too:
      # `cargo test --lib corelib` SIGSEGVs under parallel scheduling while
      # `--test-threads=1` passes 736/736). RUST_MIN_STACK=8 MB only lowers
      # the crash probability, it does not eliminate it — the corruption is
      # not a pure stack overflow. cargo test is run ONLY on this Windows
      # step (Linux/macOS exercise the VM via test-all.sh goldens, not the
      # Rust unit harness), so serializing here is the targeted stopgap.
      # TODO: root-cause the race (suspect: GC region raw-pointer Send/Sync
      # unsoundness with multiple concurrent VmCores) and restore parallelism.
      # remove-dotnet-from-builds: the C# `dotnet test z42.Tests` (compiler unit
      # tests) is dropped — src/compiler is being retired and z42c correctness is
      # covered C#-free by the self-host fixpoint + VM goldens + stdlib [Test] gate.
      # cargo test (Rust VM unit harness) stays — it runs ONLY on this Windows leg.
      - name: Smoke test (Windows — Rust VM unit tests)
        if: matrix.os == 'windows-latest'
        env:
          RUST_MIN_STACK: '8388608'
        run: |
          cargo test --locked --manifest-path src/runtime/Cargo.toml -- --test-threads=1


  # ── parallelize-host-package: SDK packaging, parallel to host tests (all 4 OS) ──
  # The host package (`xtask package release`) used to run sequentially after
  # `test all` on each build-and-test leg, adding ~10 min to the critical path. It's
  # independent of the tests, so it now runs as its own job off the shared toolchain-
  # bootstrap artifact (C#-free) — ready well before the tests finish. All 4 OS, incl.
  # windows-latest (consumes the platform-independent toolchain-ubuntu-latest zpkgs +
  # cargo-builds its own z42vm). build-and-test is now pure test. publish-nightly
  # consumes these uploads.
  host-package:
    name: host-package (${{ matrix.os }})
    needs: toolchain-bootstrap
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-
            ${{ runner.os }}-cargo-

      - uses: ./.github/actions/xtask-bootstrap-artifact

      - name: Package host RID (z42 xtask.zpkg package)
        shell: bash
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"; [ -f "$vm.exe" ] && vm="$vm.exe"
          # Windows: `package` cargo-relinks z42vm and can't overwrite the *running*
          # z42vm.exe → run xtask from a copy outside the cargo output dir. (No-op on
          # Linux/macOS.)
          runner="$vm"
          if [ "${RUNNER_OS:-}" = "Windows" ]; then
            mkdir -p "$PWD/.ci-runner"; cp "$vm" "$PWD/.ci-runner/"
            cp "$PWD"/artifacts/build/runtime/release/*.dll "$PWD/.ci-runner/" 2>/dev/null || true
            runner="$PWD/.ci-runner/$(basename "$vm")"
          fi
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$PWD/artifacts/build/libraries/dist/release" \
            "$runner" artifacts/xtask/xtask.zpkg -- package release

      - name: Verify package manifest + native artifacts
        shell: bash
        run: |
          set -euo pipefail
          pkg_dir=$(ls -d artifacts/packages/z42-*-release | head -1)
          [ -d "$pkg_dir" ] || { echo "error: no package produced"; exit 1; }
          echo "Package: $pkg_dir"
          test -f "$pkg_dir/manifest.toml"        || { echo "missing manifest.toml"; exit 1; }
          test -d "$pkg_dir/libs"                 || { echo "missing libs/"; exit 1; }
          test -d "$pkg_dir/native/include"       || { echo "missing native/include/"; exit 1; }
          if [ -f "$pkg_dir/bin/z42c.exe" ]; then
              echo "✓ bin/z42c.exe ($(du -h "$pkg_dir/bin/z42c.exe" | cut -f1))"
          elif [ -f "$pkg_dir/bin/z42c" ]; then
              echo "✓ bin/z42c ($(du -h "$pkg_dir/bin/z42c" | cut -f1))"
          else
              echo "error: bin/z42c[.exe] missing"; ls -la "$pkg_dir/bin/"; exit 1
          fi
          if [ -f "$pkg_dir/native/libz42_compression.dylib" ] \
             || [ -f "$pkg_dir/native/libz42_compression.so" ] \
             || [ -f "$pkg_dir/native/z42_compression.dll" ]; then
              echo "✓ native/libz42_compression.* (dlopen target)"
          else
              echo "error: native/libz42_compression.{dylib,so,dll} missing — z42.compression facade will fail with 'unknown builtin' at runtime"
              ls -la "$pkg_dir/native/"; exit 1
          fi
          test -f "$pkg_dir/native/libz42_compression.a" \
              && echo "✓ native/libz42_compression.a (staticlib for mobile / future bundled link)"
          test -f "$pkg_dir/libs/z42.compression.zpkg" \
              || { echo "error: libs/z42.compression.zpkg missing"; exit 1; }
          echo "✓ libs/z42.compression.zpkg"
          test ! -e "$pkg_dir/bin/apphost" && test ! -e "$pkg_dir/bin/apphost.exe" \
              || { echo "error: apphost must NOT be in SDK bin/ anymore (it ships via desktop workload)"; exit 1; }
          dt_dir=$(ls -d artifacts/packages/z42-workload-*-desktop-* 2>/dev/null | head -1)
          [ -d "$dt_dir" ] || { echo "error: no desktop workload package produced"; exit 1; }
          ls "$dt_dir"/apphost-* >/dev/null 2>&1 \
              || { echo "error: desktop workload missing apphost-<rid> stub"; ls -la "$dt_dir"; exit 1; }
          test -f "$dt_dir/manifest.toml" || { echo "missing desktop workload manifest.toml"; exit 1; }
          echo "✓ desktop workload: $dt_dir"
          echo "--- manifest.toml ---"
          cat "$pkg_dir/manifest.toml"

      - name: Upload host package
        uses: actions/upload-artifact@v4
        with:
          name: z42-host-package-${{ matrix.os }}
          path: artifacts/packages/
          retention-days: 14
          if-no-files-found: error

  # ── C#-free toolchain artifact (parallelization keystone + option-B seed handoff) ──
  # Bootstrap the host compiler ONCE per host OS (z42c + stdlib + xtask, all C#-free
  # via the prev nightly seed) and publish the .zpkg products as `toolchain-<os>`. The
  # package / platform-test jobs consume it (xtask-bootstrap-artifact action) + cargo-
  # build their own z42vm — dropping their dotnet source-build — and run in parallel
  # instead of each re-bootstrapping. Fast: bootstrap only, no test.
  toolchain-bootstrap:
    name: toolchain-bootstrap (${{ matrix.os }})
    # Runs unconditionally (like build-and-test) — its artifact roots the package
    # jobs (which always run) + the platform-test jobs, so it must always be present.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Bootstrap C#-free (nightly z42c seed → current source)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.os }}" in
            ubuntu-latest) rid=linux-x64 ;;
            macos-15)      rid=macos-arm64 ;;
            *) echo "::error::unmapped os ${{ matrix.os }}"; exit 1 ;;
          esac
          bash scripts/ci-bootstrap-nocs.sh "$rid"

      - name: Stage C#-free toolchain (zpkg products only)
        shell: bash
        run: bash scripts/ci-stage-toolchain.sh "$RUNNER_TEMP/tc"

      - name: Upload toolchain-${{ matrix.os }}
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-${{ matrix.os }}
          path: ${{ runner.temp }}/tc/
          retention-days: 3
          if-no-files-found: error

      # compile-once P2 (additive): assemble the warm toolchain into a `.z42`
      # layout (programs/z42c + libs + bin) consumable by `xtask --toolchain
      # <dir>`. --no-build = assemble from the canonical artifacts the bootstrap
      # above just produced (no redundant rebuild). This is the future
      # `current-sdk` that downstream test jobs will consume (P3) instead of each
      # re-bootstrapping; uploaded alongside toolchain-<os> so nothing existing
      # breaks while the consumers migrate.
      # continue-on-error: this is an additive validation step. If `build sdk`
      # hits a CI-only path difference, the job stays green and the existing
      # toolchain-<os> artifact (+ package jobs) are unaffected — only current-sdk
      # is skipped. Check whether the current-sdk-<os> artifact appears to confirm
      # it worked; drop continue-on-error once proven (then it becomes a gate).
      - name: Assemble .z42 toolchain (build sdk --no-build)
        continue-on-error: true
        shell: bash
        run: |
          Z42_PORTABLE_VM="$PWD/artifacts/build/runtime/release/z42vm" \
          Z42_LIBS="$PWD/artifacts/build/libraries/dist/release" \
            artifacts/build/runtime/release/z42vm artifacts/xtask/xtask.zpkg -- \
            build sdk --out "$RUNNER_TEMP/z42sdk" --no-build

      - name: Upload current-sdk-${{ matrix.os }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: current-sdk-${{ matrix.os }}
          path: ${{ runner.temp }}/z42sdk/
          retention-days: 3
          if-no-files-found: warn

  # ── compile-once P3 (additive): consume current-sdk cross-job ───────────────
  # Proves the current-sdk `.z42` artifact, downloaded fresh in a SEPARATE job, is
  # a working self-contained toolchain: its own bin/z42vm + programs/z42c/driver +
  # libs/ compile a real project (xtask) with no rebuild/bootstrap. This is the
  # downstream-consume model (test jobs will adopt it instead of each re-
  # bootstrapping) + the seed of cross-bootstrap (Decision 7). continue-on-error
  # while we validate — promote to a gate once proven.
  consume-current-sdk:
    name: consume-current-sdk (cross-job)
    needs: toolchain-bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download current-sdk-ubuntu-latest
        uses: actions/download-artifact@v4
        with:
          name: current-sdk-ubuntu-latest
          path: .z42-dl
      - name: Compile + run via ONLY the downloaded toolchain (consume smoke)
        shell: bash
        run: |
          set -euo pipefail
          TC="$PWD/.z42-dl"
          chmod +x "$TC/bin/z42vm"
          ls "$TC/programs/z42c/" "$TC/libs/" >/dev/null
          # compile a real project (xtask) with the downloaded toolchain's z42c
          Z42_LIBS="$TC/libs" "$TC/bin/z42vm" "$TC/programs/z42c/z42c.driver.zpkg" --mode interp -- \
            build scripts/xtask.z42.toml --release --output-dir "$RUNNER_TEMP/consume-out"
          test -f "$RUNNER_TEMP/consume-out/xtask.zpkg" \
            || { echo "::error::current-sdk compile failed — no xtask.zpkg"; exit 1; }
          # execute the just-compiled zpkg on the toolchain's z42vm (proves run, not just compile)
          out=$(Z42_LIBS="$TC/libs" "$TC/bin/z42vm" "$RUNNER_TEMP/consume-out/xtask.zpkg" -- build -h)
          echo "$out" | grep -q "build sdk\|SUBCOMMANDS" \
            && echo "✅ current-sdk compiles AND runs (cross-job, self-contained)" \
            || { echo "::error::current-sdk run failed"; echo "$out"; exit 1; }

  # ── VM cross-mode consistency (0.3.0 退出标准) ───────────────────────────
  # split-interp-jit: `xtask test all` in build-and-test runs the golden suites in
  # INTERP only (on every host OS). This job is the SOLE JIT gate — it runs the VM
  # goldens + cross-zpkg under JIT here, catching interp/JIT divergence (opcode
  # handling, codegen bugs) before main. Single linux-x64 lane is enough — cranelift
  # JIT behaviour is host-independent, so running jit on every build-and-test OS leg
  # was redundant (5× the slow per-case cranelift compile) and is now removed from the
  # host legs' critical path.
  vm-jit-consistency:
    name: vm-jit-consistency (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (shared key with build-and-test)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-
            ${{ runner.os }}-cargo-

      # C#-free: seed the toolchain from the prev nightly's z42c-written compiler
      # (NO dotnet) and build current source warm — same path as build-and-test.
      # Replaces the download-nightly `xtask-bootstrap` action, whose test-time
      # rebuild left artifacts/build/ empty → fell back to the C# cold seed
      # (the reason this job needed setup-dotnet).
      - name: Bootstrap C#-free (nightly z42c seed → current source)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: bash scripts/ci-bootstrap-nocs.sh linux-x64

      - name: VM goldens — JIT mode (shard ${{ matrix.shard }}/4)
        shell: bash
        run: |
          set -euo pipefail
          # warm C#-free toolchain; xtask runs this shard of the JIT goldens on z42vm.
          # cranelift JIT per-case compile is the slow part → split across 4 shards.
          vm="$PWD/artifacts/build/runtime/release/z42vm"
          libs="$PWD/artifacts/build/libraries/dist/release"
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$libs" "$vm" artifacts/xtask/xtask.zpkg -- test vm jit --shard ${{ matrix.shard }}/4 --jobs=4
          # cross-zpkg jit is small (a few cases) — run it once, on shard 1 only.
          if [ "${{ matrix.shard }}" = "1" ]; then
            Z42_PORTABLE_VM="$vm" Z42_LIBS="$libs" "$vm" artifacts/xtask/xtask.zpkg -- test cross-zpkg jit
          fi

  # ── stdlib [Test] JIT consistency (parallelize-and-jit-stdlib-tests) ──────
  # build-and-test runs the 272 stdlib [Test] files under interp (in-process
  # runner). This job re-runs them under JIT (`--mode jit` forks z42vm --mode
  # jit per unit) to catch interp/JIT divergence in stdlib — the in-process
  # runner can't drive the JIT, so subprocess is the proven jit path. Separate
  # parallel lane (not folded into vm-jit-consistency) so it overlaps build-and-
  # test instead of extending the critical path. linux-x64 only — cranelift
  # behaviour is host-independent (same rationale as vm-jit-consistency).
  stdlib-jit-consistency:
    name: stdlib-jit-consistency (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (shared key with build-and-test)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-
            ${{ runner.os }}-cargo-

      # C#-free: seed from the prev nightly's z42c-written compiler (NO dotnet) and
      # build current source warm — same path as build-and-test. Replaces the
      # download-nightly `xtask-bootstrap` action whose test-time rebuild fell back
      # to the C# cold seed (the reason this job needed setup-dotnet).
      - name: Bootstrap C#-free (nightly z42c seed → current source)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: bash scripts/ci-bootstrap-nocs.sh linux-x64

      - name: stdlib [Test] — JIT mode (shard ${{ matrix.shard }}/4)
        shell: bash
        run: |
          set -euo pipefail
          # warm C#-free toolchain; xtask runs this shard's stdlib [Test] units under
          # JIT (subprocess fork z42vm --mode jit). --shard splits the libs balanced by
          # unit count across 4 machines; --jobs 4 parallelizes within the shard.
          vm="$PWD/artifacts/build/runtime/release/z42vm"
          libs="$PWD/artifacts/build/libraries/dist/release"
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$libs" "$vm" artifacts/xtask/xtask.zpkg -- test stdlib --mode jit --shard ${{ matrix.shard }}/4 --jobs 4

  # ── C#-free self-host bootstrap (replace-csharp-compiler S4) ──────────────
  # Proves z42c can rebuild stdlib + z42c + xtask from CURRENT source using the
  # DOWNLOADED nightly z42c-written seed (runtime pkg z42c/ + libs/), with NO C#.
  # NO setup-dotnet on purpose — dotnet is absent, so "no C#" is structural, not
  # asserted. Like the other download-bootstrap jobs, this transiently fails on an
  # OLD nightly predating the z42c seed until publish-nightly republishes a
  # seed-carrying nightly; then it self-heals. NOT in publish-nightly's needs (no
  # deadlock). linux-x64 only.
  bootstrap-no-csharp:
    name: bootstrap-no-csharp (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (shared key with build-and-test)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-
            ${{ runner.os }}-cargo-

      - name: C#-free bootstrap from nightly z42c seed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # Download the nightly runtime package: z42vm + libs/ (stdlib) + z42c/ (seed).
          gh release download nightly -p 'z42-runtime-nightly-linux-x64.tar.gz' -O /tmp/rt.tgz
          mkdir -p /tmp/rtpkg && tar -C /tmp/rtpkg -xzf /tmp/rt.tgz
          seed="$PWD/.nocs-seed"; rm -rf "$seed"; mkdir -p "$seed"
          if ! ls /tmp/rtpkg/z42c/*.zpkg >/dev/null 2>&1; then
            echo "::error::nightly runtime package has no z42c/ seed yet — needs a publish-nightly republish carrying the z42c-written seed (self-heals)"; exit 1
          fi
          cp -f /tmp/rtpkg/z42c/*.zpkg "$seed/"
          cp -f /tmp/rtpkg/libs/*.zpkg "$seed/"
          echo "seed: $(ls "$seed"/*.zpkg | wc -l) zpkg (z42c-written compiler + stdlib)"
          # Hard no-C# guard: shadow `dotnet` with a failing stub on PATH so ANY
          # C# invocation aborts the build. (ubuntu-latest ships dotnet in the base
          # image, so mere presence proves nothing — we prove it's never CALLED.)
          mkdir -p /tmp/nocsbin
          printf '#!/usr/bin/env bash\necho "::error::dotnet invoked — bootstrap must be C#-free" >&2\nexit 97\n' > /tmp/nocsbin/dotnet
          chmod +x /tmp/nocsbin/dotnet
          PATH="/tmp/nocsbin:$PATH" bash scripts/bootstrap-no-csharp.sh "$seed"

  # ── z42c dogfood-builds stdlib (replace-csharp-compiler S2.1) ─────────────
  # Validates the self-host compiler (z42c) can build the ENTIRE stdlib
  # workspace via `build --workspace` and that the z42c-built stdlib is
  # functionally correct (z42c re-runs against it). Additive — C# stays the
  # bootstrap seed; products land in a private dogfood dir, production stdlib
  # untouched. Gates the C#→z42c replacement path (roadmap S2). linux-x64 only.
  compiler-z42-stdlib:
    name: compiler-z42-stdlib (linux-x64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (shared key with build-and-test)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-
            ${{ runner.os }}-cargo-

      # C#-free: seed from the prev nightly's z42c-written compiler (NO dotnet) and
      # build current source warm — same path as build-and-test. Replaces the
      # download-nightly `xtask-bootstrap` action whose test-time rebuild fell back
      # to the C# cold seed (the reason this job needed setup-dotnet).
      - name: Bootstrap C#-free (nightly z42c seed → current source)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: bash scripts/ci-bootstrap-nocs.sh linux-x64

      - name: z42c dogfood-builds stdlib (xtask)
        shell: bash
        run: |
          set -euo pipefail
          # warm C#-free toolchain (z42c seed already in place); the command
          # re-builds all 22 stdlib pkgs via z42c build --workspace + a functional
          # emit check against the z42c-built stdlib.
          vm="$PWD/artifacts/build/runtime/release/z42vm"
          libs="$PWD/artifacts/build/libraries/dist/release"
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$libs" "$vm" artifacts/xtask/xtask.zpkg -- test compiler-z42-stdlib

  # P1.D.2: PR-only bench smoke. Runs `just bench-e2e --quick` on linux,
  # uploads bench/results/e2e.json as artifact for manual inspection.
  # No diff/gate yet — that's P1.D.3 (gh-pages baseline + automatic PR diff).
  # Note: noisy CI runners make 5% gate unreliable; current smoke just verifies
  # bench infra works in CI. Manual download + `xtask bench --diff` for now.
  bench-e2e:
    name: bench-e2e (smoke, PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install hyperfine
        run: |
          wget -q https://github.com/sharkdp/hyperfine/releases/download/v1.20.0/hyperfine_1.20.0_amd64.deb
          sudo dpkg -i hyperfine_1.20.0_amd64.deb

      - name: Cache cargo (shared key with build-and-test)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # C#-free: seed from the prev nightly's z42c-written compiler (NO dotnet) and
      # build current source warm. Replaces the download-nightly `xtask-bootstrap`
      # action whose bench rebuild fell back to the C# cold seed.
      - name: Bootstrap C#-free (nightly z42c seed → current source)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: bash scripts/ci-bootstrap-nocs.sh linux-x64

      - name: Run e2e bench (quick mode, xtask)
        shell: bash
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"
          libs="$PWD/artifacts/build/libraries/dist/release"
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$libs" "$vm" artifacts/xtask/xtask.zpkg -- bench --quick

      - name: Upload bench results
        uses: actions/upload-artifact@v4
        with:
          name: bench-e2e-results-${{ runner.os }}
          path: bench/results/e2e.json
          retention-days: 30
          if-no-files-found: error

      # ── P1.D.4: informational diff against main baseline ──
      # Fetch latest baseline from bench-baselines branch (published by
      # bench-update.yml on main pushes). Tolerates absence (first PR before
      # any main push has happened, or fetch failure).
      - name: Fetch main baseline
        id: fetch-baseline
        continue-on-error: true
        run: |
          set -euo pipefail
          if git fetch origin bench-baselines:bench-baselines 2>/dev/null; then
            if git show bench-baselines:baselines/e2e-ubuntu-latest.json > /tmp/main-baseline.json 2>/dev/null; then
              if [[ -s /tmp/main-baseline.json ]]; then
                echo "BASELINE_AVAILABLE=true" >> "$GITHUB_ENV"
                echo "→ Fetched main baseline ($(wc -c < /tmp/main-baseline.json) bytes)"
              fi
            fi
          fi
          if [[ -z "${BASELINE_AVAILABLE:-}" ]]; then
            echo "→ No main baseline available (yet)"
          fi

      - name: Diff vs main baseline (informational, never fails)
        if: env.BASELINE_AVAILABLE == 'true'
        continue-on-error: true
        run: |
          {
            echo "## Bench diff vs main"
            echo ""
            echo '```'
            "$PWD/.z42/z42" artifacts/xtask/xtask.zpkg -- bench --diff \
              --current  bench/results/e2e.json \
              --baseline /tmp/main-baseline.json \
              --threshold-time   0.15 \
              --threshold-memory 0.20 \
              2>&1 || true
            echo '```'
            echo ""
            echo "_Thresholds inflated to 15% (time) / 20% (memory) — CI runners are noisy._"
            echo "_Informational only: does not fail this check._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Note when baseline absent
        if: env.BASELINE_AVAILABLE != 'true'
        run: |
          {
            echo "## Bench diff vs main"
            echo ""
            echo "ℹ️ No baseline available on \`bench-baselines\` branch yet."
            echo ""
            echo "First push to main triggers \`.github/workflows/bench-update.yml\`,"
            echo "which seeds the baseline. Subsequent PRs will see auto-diff here."
          } >> "$GITHUB_STEP_SUMMARY"

  # 2026-05-07 add-runtime-feature-flags (P4.1): verify all 4 feature presets
  # compile on host target. P4.2/P4.3/P4.4 will add real cross-compile jobs
  # (wasm32-unknown-unknown / aarch64-apple-ios / aarch64-linux-android).
  feature-matrix:
    name: feature-matrix (P4.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # migrate-scripts-to-z42: feature presets are plain cargo feature combos
      # (was `just build-*-feature`) — inlined so this job needs no `just`.
      - name: Build interp-only (no cranelift)
        run: cargo build --locked --release --manifest-path src/runtime/Cargo.toml --no-default-features --features interp-only

      - name: Build wasm preset (host target)
        run: cargo build --locked --release --manifest-path src/runtime/Cargo.toml --no-default-features --features wasm

      - name: Build ios preset (host target)
        run: cargo build --locked --release --manifest-path src/runtime/Cargo.toml --no-default-features --features ios

      - name: Build android preset (host target)
        run: cargo build --locked --release --manifest-path src/runtime/Cargo.toml --no-default-features --features android

      - name: Verify cranelift excluded under interp-only
        run: |
          if cargo tree --manifest-path src/runtime/Cargo.toml \
             --no-default-features --features interp-only 2>&1 | grep -q "cranelift"; then
            echo "ERROR: cranelift still present in interp-only build" >&2
            exit 1
          fi

      # (versions.toml drift check moved to build-and-test via
      # `z42 xtask.zpkg deps check` — migrate-scripts-to-z42.)

  # ── iOS packaging ──────────────────────────────────────────────────────
  # Packages ios-arm64 + iossim-arm64. Requires Xcode (pre-installed on
  # macos-15 arm64) + iOS Rust targets. The source bootstrap also builds z42c.
  package-ios:
    name: package-ios
    needs: toolchain-bootstrap
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4


      - name: Setup Rust + iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ios-
            ${{ runner.os }}-cargo-


      - uses: ./.github/actions/xtask-bootstrap-artifact

      - name: Package ios-arm64 + iossim-arm64 (z42 xtask.zpkg package)
        shell: bash
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"
          libs="$PWD/artifacts/build/libraries/dist/release"
          for rid in ios-arm64 iossim-arm64; do
            Z42_PORTABLE_VM="$vm" Z42_LIBS="$libs" \
              "$vm" artifacts/xtask/xtask.zpkg -- package release --rid "$rid"
          done

      - name: Verify iOS packages
        run: |
          set -euo pipefail
          # runtime/workload split (B2-1): tooling pkg = SwiftPM sources + placeholder
          # Package.swift; native libs + Z42VM.xcframework live in the separate runtime pack.
          for rid in ios-arm64 iossim-arm64; do
            pkg_dir=$(ls -d artifacts/packages/z42-*-${rid}-release | head -1)
            rt_dir=$(ls -d artifacts/packages/z42-runtime-*-${rid} 2>/dev/null | head -1)
            [ -d "$pkg_dir" ] || { echo "error: no $rid tooling package"; exit 1; }
            [ -d "$rt_dir" ]  || { echo "error: no $rid runtime pack (z42-runtime-*-$rid)"; exit 1; }
            echo "Tooling: $pkg_dir   Runtime: $rt_dir"
            # tooling (workload): SwiftPM sources + self-contained Z42VMC header + placeholder Package.swift
            test -f "$pkg_dir/manifest.toml"                     || { echo "missing manifest.toml"; exit 1; }
            test -d "$pkg_dir/Sources/Z42VM"                     || { echo "missing Sources/Z42VM/"; exit 1; }
            test -f "$pkg_dir/Sources/Z42VMC/include/z42_host.h" || { echo "missing self-contained Z42VMC header"; exit 1; }
            test -f "$pkg_dir/Package.swift"                     || { echo "missing Package.swift"; exit 1; }
            grep -q "__Z42_RUNTIME_XCFRAMEWORK__" "$pkg_dir/Package.swift" \
              || { echo "Package.swift not an install-resolved placeholder template"; exit 1; }
            # runtime pack: native static lib + xcframework + headers + stdlib libs
            test -f "$rt_dir/native/libz42.a"            || { echo "missing runtime native/libz42.a"; exit 1; }
            test -d "$rt_dir/native/Z42VM.xcframework"   || { echo "missing runtime Z42VM.xcframework/"; exit 1; }
            test -d "$rt_dir/native/include"             || { echo "missing runtime native/include/"; exit 1; }
            test -d "$rt_dir/libs"                       || { echo "missing runtime libs/"; exit 1; }
            # lipo: xcframework contains an arm64 Mach-O static archive
            xcfw_lib=$(find "$rt_dir/native/Z42VM.xcframework" -name "libz42.a" | head -1)
            [ -f "$xcfw_lib" ] || { echo "error: libz42.a missing inside xcframework"; exit 1; }
            lipo_out=$(lipo -info "$xcfw_lib")
            echo "$lipo_out" | grep -q "arm64" \
              || { echo "error: $rid xcframework wrong arch: $lipo_out"; exit 1; }
            echo "✓ $rid lipo: $lipo_out"
          done

      - name: Upload iOS packages
        uses: actions/upload-artifact@v4
        with:
          name: z42-ios-packages
          path: artifacts/packages/
          retention-days: 14
          if-no-files-found: error

  # ── Android packaging ───────────────────────────────────────────────────
  # Packages android-arm64 + android-x64 via cargo-ndk + NDK r26d.
  package-android:
    name: package-android
    needs: toolchain-bootstrap
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4


      - name: Setup Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      # local-cache: false — local-cache produced an incomplete ANDROID_NDK_HOME
      # (clang missing under toolchains/llvm/prebuilt/) causing libffi-sys's
      # configure to fail. Fresh download is ~2 min slower but reliable.
      - name: Setup Android NDK r26d
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          local-cache: false

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-
            ${{ runner.os }}-cargo-


      - uses: ./.github/actions/xtask-bootstrap-artifact

      - name: Package android-arm64 + android-x64 (z42 xtask.zpkg package)
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"
          libs="$PWD/artifacts/build/libraries/dist/release"
          for rid in android-arm64 android-x64; do
            Z42_PORTABLE_VM="$vm" Z42_LIBS="$libs" \
              "$vm" artifacts/xtask/xtask.zpkg -- package release --rid "$rid"
          done

      - name: Verify Android packages
        run: |
          set -euo pipefail
          # runtime/workload split (B2-3): tooling pkg = gradle project; per-ABI .so/.a
          # + headers + stdlib libs live in the separate runtime pack.
          for rid in android-arm64 android-x64; do
            pkg_dir=$(ls -d artifacts/packages/z42-*-${rid}-release | head -1)
            rt_dir=$(ls -d artifacts/packages/z42-runtime-*-${rid} 2>/dev/null | head -1)
            [ -d "$pkg_dir" ] || { echo "error: no $rid tooling package"; exit 1; }
            [ -d "$rt_dir" ]  || { echo "error: no $rid runtime pack (z42-runtime-*-$rid)"; exit 1; }
            echo "Tooling: $pkg_dir   Runtime: $rt_dir"
            # tooling (workload): the buildable gradle project + self-contained JNI header
            test -f "$pkg_dir/manifest.toml"                          || { echo "missing manifest.toml"; exit 1; }
            test -f "$pkg_dir/gradlew"                                || { echo "missing gradlew"; exit 1; }
            test -f "$pkg_dir/settings.gradle.kts"                    || { echo "missing settings.gradle.kts"; exit 1; }
            test -d "$pkg_dir/z42vm/src/main/java/io/z42/vm"          || { echo "missing kotlin facade"; exit 1; }
            test -f "$pkg_dir/z42vm/src/main/cpp/z42vm_jni.c"         || { echo "missing JNI bridge"; exit 1; }
            test -f "$pkg_dir/z42vm/src/main/cpp/include/z42_host.h"  || { echo "missing self-contained JNI header"; exit 1; }
            # runtime pack: per-ABI .so + .a + headers + stdlib libs
            test -f "$rt_dir/native/libz42_platform_android.so"      || { echo "missing runtime .so"; exit 1; }
            test -f "$rt_dir/native/libz42_platform_android.a"       || { echo "missing runtime .a"; exit 1; }
            test -d "$rt_dir/native/include"                         || { echo "missing runtime native/include/"; exit 1; }
            test -d "$rt_dir/libs"                                   || { echo "missing runtime libs/"; exit 1; }
            # ELF architecture of the runtime .so
            so="$rt_dir/native/libz42_platform_android.so"
            file_out=$(file "$so")
            case "$rid" in
              android-arm64)
                echo "$file_out" | grep -q "ARM aarch64" \
                  || { echo "error: $rid .so wrong arch: $file_out"; exit 1; }
                echo "✓ $rid ELF arch: ARM aarch64" ;;
              android-x64)
                echo "$file_out" | grep -q "x86-64" \
                  || { echo "error: $rid .so wrong arch: $file_out"; exit 1; }
                echo "✓ $rid ELF arch: x86-64" ;;
            esac
          done

      - name: Upload Android packages
        uses: actions/upload-artifact@v4
        with:
          name: z42-android-packages
          path: artifacts/packages/
          retention-days: 14
          if-no-files-found: error

  # ── wasm packaging ──────────────────────────────────────────────────────
  # Packages browser-wasm via wasm-pack (no Node.js needed — wasm-pack build
  # only generates JS glue, it doesn't execute it).
  # `xtask test platform wasm build` (WasmBackend) produces pkg-web/ +
  # pkg-nodejs/ before `xtask package` can assemble the wasm SDK package.
  package-wasm:
    name: package-wasm
    needs: toolchain-bootstrap
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4


      - name: Setup Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack + wasm-tools
        run: cargo install wasm-pack wasm-tools --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-


      - uses: ./.github/actions/xtask-bootstrap-artifact

      - name: Build wasm platform (pkg-web/ + pkg-nodejs/ via test platform wasm build)
        shell: bash
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$PWD/artifacts/build/libraries/dist/release" \
            "$vm" artifacts/xtask/xtask.zpkg -- test platform wasm build

      - name: Package browser-wasm (z42 xtask.zpkg package)
        shell: bash
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$PWD/artifacts/build/libraries/dist/release" \
            "$vm" artifacts/xtask/xtask.zpkg -- package release --rid browser-wasm

      - name: Verify wasm package + WebAssembly validation
        run: |
          set -euo pipefail
          # runtime/workload split (B2-3): tooling pkg = js facade + package.json; the
          # wasm module + libz42.a + pkg-web/pkg-nodejs + stdlib libs live in the runtime pack.
          pkg_dir=$(ls -d artifacts/packages/z42-*-browser-wasm-release | head -1)
          rt_dir=$(ls -d artifacts/packages/z42-runtime-*-browser-wasm 2>/dev/null | head -1)
          [ -d "$pkg_dir" ] || { echo "error: no browser-wasm tooling package"; exit 1; }
          [ -d "$rt_dir" ]  || { echo "error: no browser-wasm runtime pack (z42-runtime-*-browser-wasm)"; exit 1; }
          echo "Tooling: $pkg_dir   Runtime: $rt_dir"
          # tooling (workload): js facade + package.json
          test -f "$pkg_dir/manifest.toml"               || { echo "missing manifest.toml"; exit 1; }
          test -f "$pkg_dir/package.json"                || { echo "missing package.json"; exit 1; }
          test -d "$pkg_dir/js"                          || { echo "missing js/"; exit 1; }
          # runtime pack: wasm module + static lib + wasm-bindgen output + stdlib libs
          test -f "$rt_dir/native/z42_wasm_bg.wasm"      || { echo "missing z42_wasm_bg.wasm"; exit 1; }
          test -f "$rt_dir/native/libz42.a"              || { echo "missing native/libz42.a"; exit 1; }
          test -d "$rt_dir/pkg-web"                      || { echo "missing pkg-web/"; exit 1; }
          test -d "$rt_dir/pkg-nodejs"                   || { echo "missing pkg-nodejs/"; exit 1; }
          test -d "$rt_dir/libs"                         || { echo "missing runtime libs/"; exit 1; }
          echo "✓ browser-wasm layout OK"
          # WebAssembly spec validation via wasm-tools (Bytecode Alliance).
          # Validates binary encoding + all active wasm proposals; no JS runtime needed.
          wasm="$rt_dir/native/z42_wasm_bg.wasm"
          wasm-tools validate "$wasm"
          export_count=$(wasm-tools print "$wasm" | grep -c '(export' || true)
          [ "$export_count" -gt 0 ] || { echo "error: no exports in wasm module"; exit 1; }
          echo "✓ wasm valid — $export_count exports (wasm-tools)"

      - name: Upload wasm package
        uses: actions/upload-artifact@v4
        with:
          name: z42-wasm-package
          path: artifacts/packages/
          retention-days: 14
          if-no-files-found: error

  # ── Nightly rolling pre-release ────────────────────────────────────────
  # On every push to main, repackage all 9 RID artifacts (host ×4 + ios ×2 +
  # android ×2 + wasm) into archives and force-replace a single `nightly`
  # GitHub Release. The tag URL stays stable so downstream consumers can pin to:
  #
  #   https://github.com/<owner>/z42/releases/download/nightly/z42-sdk-nightly-<rid>.{tar.gz,zip}
  #
  # Not signed. Marked --prerelease. Skipped on PRs (token + fork-PR limitations).
  publish-nightly:
    name: publish-nightly
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    # NIGHTLY-SEED DEADLOCK POSTURE (remove-dotnet / option-B): since the C# compiler
    # was removed, EVERY bootstrap path (build-and-test, host-package, package-*, all
    # via ci-bootstrap-nocs.sh / toolchain-bootstrap) seeds from the PREVIOUS nightly's
    # z42c and builds current source with it — there is no longer a from-C#-source path
    # that's independent of a prior nightly. The self-heal invariant now rests entirely
    # on the staged-bootstrap discipline (.claude/rules/bootstrap-seed.md): the prev
    # nightly's z42c MUST always be able to compile current source (new syntax / zbc
    # bump lands "support" one release before "use"; scripts/check-bootstrap-compat.sh
    # is the boundary check). If that discipline is ever violated, the prev nightly
    # can't build current source → these deps fail → publish can't republish a fixed
    # nightly → manual recovery (there's no C# fallback). Keep `needs` to the jobs that
    # build + test + package CURRENT source (build-and-test test + windows pkg,
    # host-package unix pkgs, package-* mobile); do NOT add the pure download-bootstrap
    # gates (vm-jit / stdlib-jit / bench-e2e) — they transiently fail on a bump until a
    # compatible nightly exists and self-heal next run, and gating publish on them
    # would add a needless deadlock edge. JIT correctness is gated by the dedicated
    # vm-jit-consistency job (build-and-test's `xtask test all` is interp-only).
    needs:
      - build-and-test
      - host-package
      - feature-matrix
      - package-ios
      - package-android
      - package-wasm
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh release create / delete
    steps:
      - uses: actions/checkout@v4

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-raw
          pattern: 'z42-*-package*'
          merge-multiple: true

      - name: Show downloaded layout (debug)
        run: |
          echo "--- dist-raw top level ---"
          ls -la dist-raw/ || true
          echo "--- z42-* dirs under dist-raw/ ---"
          find dist-raw -maxdepth 1 -type d | sort || true

      - name: Layout + archive each RID package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/packages artifacts/release
          out="$(pwd)/artifacts/release"

          # Find SDK package dirs (z42-*-release) at top level.
          mapfile -t sdk_dirs < <(find dist-raw -maxdepth 1 -type d -name 'z42-*-release' | sort -u)
          [ "${#sdk_dirs[@]}" -gt 0 ] \
              || { echo "error: no z42-*-release dirs under dist-raw/"; find dist-raw -maxdepth 3 -type d; exit 1; }
          echo "→ Found ${#sdk_dirs[@]} SDK package dirs"

          for src in "${sdk_dirs[@]}"; do
              name=$(basename "$src")          # z42-<v>-<rid>-release
              stripped=${name#z42-}            # <v>-<rid>-release
              stripped=${stripped%-release}    # <v>-<rid>
              # rid = last segment matching a known suffix (handles linux-x64,
              # iossim-arm64, browser-wasm). iOS device (ios-arm64) and simulator
              # (iossim-arm64) now use distinct prefixes, so suffix matching is
              # unambiguous regardless of list order.
              rid=""
              for candidate in linux-x64 linux-arm64 macos-arm64 windows-x64 \
                               iossim-arm64 ios-arm64 \
                               android-arm64 android-x64 browser-wasm; do
                  if [[ "$stripped" == *-"$candidate" ]]; then rid="$candidate"; break; fi
              done
              [ -n "$rid" ] || { echo "error: cannot infer RID from $name"; exit 1; }

              # Rename to neutral version label so the download URL stays stable.
              new_name="z42-nightly-${rid}-release"
              dst="artifacts/packages/$new_name"
              rm -rf "$dst"; cp -R "$src" "$dst"

              if [ "$rid" = "windows-x64" ]; then
                  # Archive contents directly (no top-level subdirectory).
                  # Use `zip` (not `tar -a`): GNU tar's zip output is incompatible
                  # with Windows Expand-Archive / Explorer on some tar versions.
                  (cd "$dst" && zip -r "${out}/z42-sdk-nightly-${rid}.zip" .)
                  echo "✓ sdk ${rid} → z42-sdk-nightly-${rid}.zip"
                  psrc=$(find dist-raw -maxdepth 1 -type d -name "z42-runtime-*-${rid}" | head -1)
                  [ -d "$psrc" ] || { echo "error: missing runtime package for ${rid}"; exit 1; }
                  (cd "$psrc" && zip -r "${out}/z42-runtime-nightly-${rid}.zip" .)
                  echo "✓ runtime ${rid} → z42-runtime-nightly-${rid}.zip"
                  dwsrc=$(find dist-raw -maxdepth 1 -type d -name "z42-workload-*-desktop-${rid}" | head -1)
                  [ -d "$dwsrc" ] || { echo "error: missing desktop workload for ${rid}"; exit 1; }
                  (cd "$dwsrc" && zip -r "${out}/z42-workload-nightly-desktop-${rid}.zip" .)
                  echo "✓ desktop workload ${rid} → z42-workload-nightly-desktop-${rid}.zip"
              elif [[ "$rid" == linux-* || "$rid" == macos-* ]]; then
                  tar -C "$dst" -czf "${out}/z42-sdk-nightly-${rid}.tar.gz" .
                  echo "✓ sdk ${rid} → z42-sdk-nightly-${rid}.tar.gz"
                  psrc=$(find dist-raw -maxdepth 1 -type d -name "z42-runtime-*-${rid}" | head -1)
                  [ -d "$psrc" ] || { echo "error: missing runtime package for ${rid}"; exit 1; }
                  tar -C "$psrc" -czf "${out}/z42-runtime-nightly-${rid}.tar.gz" .
                  echo "✓ runtime ${rid} → z42-runtime-nightly-${rid}.tar.gz"
                  dwsrc=$(find dist-raw -maxdepth 1 -type d -name "z42-workload-*-desktop-${rid}" | head -1)
                  [ -d "$dwsrc" ] || { echo "error: missing desktop workload for ${rid}"; exit 1; }
                  tar -C "$dwsrc" -czf "${out}/z42-workload-nightly-desktop-${rid}.tar.gz" .
                  echo "✓ desktop workload ${rid} → z42-workload-nightly-desktop-${rid}.tar.gz"
              else
                  # Platform RID (runtime/workload split): runtime pack (per RID) +
                  # workload tooling (primary RID only — identical across ABIs/slices).
                  psrc=$(find dist-raw -maxdepth 1 -type d -name "z42-runtime-*-${rid}" | head -1)
                  [ -d "$psrc" ] || { echo "error: missing runtime pack for ${rid}"; exit 1; }
                  tar -C "$psrc" -czf "${out}/z42-runtime-nightly-${rid}.tar.gz" .
                  echo "✓ runtime ${rid} → z42-runtime-nightly-${rid}.tar.gz"
                  case "$rid" in
                    ios-arm64)     wl=ios ;;
                    android-arm64) wl=android ;;
                    browser-wasm)  wl=wasm ;;
                    *)             wl="" ;;
                  esac
                  if [ -n "$wl" ]; then
                      tar -C "$dst" -czf "${out}/z42-workload-nightly-${wl}.tar.gz" .
                      echo "✓ workload ${wl} → z42-workload-nightly-${wl}.tar.gz"
                  fi
              fi
          done

      # Merge the 4 per-RID desktop-workload pieces into ONE RID-agnostic
      # z42-workload-nightly-desktop.tar.gz (every RID's apphost-<rid>) → cross-output.
      - name: Assemble single desktop workload (nightly)
        shell: bash
        run: scripts/release/assemble-desktop-workload.sh nightly artifacts/release

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts/release
          shasum -a 256 z42-*.tar.gz z42-*.zip 2>/dev/null | sort -k2 > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Generate release-index.json
        shell: bash
        run: scripts/release/gen-release-index.sh nightly artifacts/release nightly nightly nightly

      - name: Force-replace nightly release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          short_sha=$(git rev-parse --short HEAD)
          today=$(date -u +%Y-%m-%d)
          # Delete prior nightly (release + tag); ignore if absent.
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          notes=$(cat <<EOF
          **Rolling pre-release** built from \`main\` on ${today} (commit \`${short_sha}\`).

          - **Unsigned** — do not use for production.
          - **Replaced on every push to main** — URL stays stable, contents change.
          - For tagged releases see [Releases](../../releases?q=v).

          ## Downloads (host)

          | Platform | SDK | Runtime |
          |----------|-----|---------|
          | Linux x64 | \`z42-sdk-nightly-linux-x64.tar.gz\` | \`z42-runtime-nightly-linux-x64.tar.gz\` |
          | Linux arm64 | \`z42-sdk-nightly-linux-arm64.tar.gz\` | \`z42-runtime-nightly-linux-arm64.tar.gz\` |
          | macOS arm64 | \`z42-sdk-nightly-macos-arm64.tar.gz\` | \`z42-runtime-nightly-macos-arm64.tar.gz\` |
          | Windows x64 | \`z42-sdk-nightly-windows-x64.zip\` | \`z42-runtime-nightly-windows-x64.zip\` |

          ## Downloads (mobile + wasm runtime)

          | Platform | Runtime |
          |----------|---------|
          | iOS arm64 (device) | \`z42-runtime-nightly-ios-arm64.tar.gz\` |
          | iOS arm64 (simulator) | \`z42-runtime-nightly-iossim-arm64.tar.gz\` |
          | Android arm64 | \`z42-runtime-nightly-android-arm64.tar.gz\` |
          | Android x64 | \`z42-runtime-nightly-android-x64.tar.gz\` |
          | Browser WASM | \`z42-runtime-nightly-browser-wasm.tar.gz\` |

          ## Workloads (\`z42 workload install <wl>\`; ios/android/wasm bundle the runtime packs above — desktop carries the per-RID apphost stubs and reuses the host runtime)

          | Workload | Tooling archive |
          |----------|-----------------|
          | Desktop (apphost) | \`z42-workload-nightly-desktop.tar.gz\` |
          | iOS (SwiftPM) | \`z42-workload-nightly-ios.tar.gz\` |
          | Android (Gradle) | \`z42-workload-nightly-android.tar.gz\` |
          | WASM (npm) | \`z42-workload-nightly-wasm.tar.gz\` |

          Verify: \`shasum -a 256 -c SHA256SUMS --ignore-missing\`
          EOF
          )
          gh release create nightly --prerelease --target "$GITHUB_SHA" \
            --title "Nightly (main @ ${short_sha} · ${today})" \
            --notes "$notes" \
            artifacts/release/SHA256SUMS artifacts/release/release-index.json artifacts/release/z42-*
          # Defensive (fix-nightly-draft): the nightly MUST be a published (non-draft)
          # release — a DRAFT is invisible to other runs' GITHUB_TOKEN, so every
          # download-bootstrap job (build-and-test C#-free, bootstrap-no-csharp,
          # vm-jit/stdlib-jit) fails with "release not found", and since build-and-test
          # now seeds from the nightly, that DEADLOCKS the self-heal (no run can
          # republish a fixed nightly). Some create paths (tag recreation after
          # --cleanup-tag) can leave it draft, so force-publish + verify here.
          gh release edit nightly --draft=false --prerelease
          if [ "$(gh release view nightly --json isDraft -q .isDraft)" = "true" ]; then
            echo "::error::nightly release is still a draft after edit — download-bootstrap jobs will fail"; exit 1
          fi
          echo "✓ nightly published (non-draft) — reachable by GITHUB_TOKEN"

  # ── Platform test pipeline → cross-platform CI dashboard ─────────────────
  # `z42 xtask.zpkg test platform <p>` (add-platform-test-pipeline) on real
  # runners: wasm (Playwright/Chromium), iOS Simulator (xcodebuild test),
  # Android emulator (reactivecircus). Each publishes its JUnit as a GitHub
  # Check via dorny/test-reporter — the 3 checks on the PR ARE the dashboard.
  # (infra-ci-platform-test-dashboard, 2026-06-16)
  test-wasm:
    name: test-wasm (browser)
    needs: [changes, toolchain-bootstrap]
    if: ${{ needs.changes.outputs.platform == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/artifacts/tools/playwright-browsers
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: ./.github/actions/xtask-bootstrap-artifact
      - name: Prime Playwright (node deps + Chromium + OS libs)
        shell: bash
        run: |
          set -euo pipefail
          cd src/toolchain/workload/wasm/platform/tests
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium
      - name: test platform wasm (build + assets + Playwright R1–R7)
        shell: bash
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"
          libs="$PWD/artifacts/build/libraries/dist/release"
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$libs" "$vm" artifacts/xtask/xtask.zpkg -- test platform wasm
      - name: Publish wasm test report (GitHub Check)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: platform-tests / wasm
          path: artifacts/test-reports/wasm/junit.xml
          reporter: java-junit
          fail-on-error: false
      - name: Upload wasm JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-wasm
          path: artifacts/test-reports/wasm/junit.xml
          if-no-files-found: warn

  test-ios:
    name: test-ios (Simulator)
    needs: [changes, toolchain-bootstrap]
    if: ${{ needs.changes.outputs.platform == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: macos-15
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust + iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,aarch64-apple-darwin
      - uses: ./.github/actions/xtask-bootstrap-artifact
      - name: test platform ios (xcframework + assets + iOS Simulator R1–R7)
        shell: bash
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"
          libs="$PWD/artifacts/build/libraries/dist/release"
          # IosBackend.RunTests now drives xcodebuild on a simctl-discovered
          # iOS Simulator and writes JUnit itself (no xcbeautify needed).
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$libs" "$vm" artifacts/xtask/xtask.zpkg -- test platform ios
      - name: Publish iOS test report (GitHub Check)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: platform-tests / ios
          path: artifacts/test-reports/ios/junit.xml
          reporter: java-junit
          fail-on-error: false
      - name: Upload iOS JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-ios
          path: artifacts/test-reports/ios/**
          if-no-files-found: warn

  test-android:
    name: test-android (emulator)
    needs: [changes, toolchain-bootstrap]
    if: ${{ needs.changes.outputs.platform == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Setup Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android NDK r26d
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
      - uses: ./.github/actions/xtask-bootstrap-artifact
      - name: test platform android — cargo-ndk + AAR + assets
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"
          libs="$PWD/artifacts/build/libraries/dist/release"
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$libs" "$vm" artifacts/xtask/xtask.zpkg -- test platform android build
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$libs" "$vm" artifacts/xtask/xtask.zpkg -- test platform android assets
      - name: connectedAndroidTest on emulator (R1–R7)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          working-directory: src/toolchain/workload/android/platform
          script: ./gradlew :z42vm:connectedAndroidTest
      - name: Publish Android test report (GitHub Check)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: platform-tests / android
          path: 'src/toolchain/workload/android/platform/z42vm/build/outputs/androidTest-results/connected/**/*.xml'
          reporter: java-junit
          fail-on-error: false
      - name: Upload Android JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-android
          path: src/toolchain/workload/android/platform/z42vm/build/outputs/androidTest-results/connected/**
          if-no-files-found: warn

  test-desktop:
    name: test-desktop (C ABI)
    needs: [changes, toolchain-bootstrap]
    if: ${{ needs.changes.outputs.platform == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      # C#-free: consume the toolchain-ubuntu-latest artifact (z42c + stdlib + xtask)
      # + cargo-build z42vm. No dotnet. (Canary for the option-B artifact handoff.)
      - uses: ./.github/actions/xtask-bootstrap-artifact
      - name: test platform desktop (Tier-1 C ABI R1–R7)
        shell: bash
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"
          libs="$PWD/artifacts/build/libraries/dist/release"
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$libs" "$vm" artifacts/xtask/xtask.zpkg -- test platform desktop
      - name: Publish desktop test report (GitHub Check)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: platform-tests / desktop
          path: artifacts/test-reports/desktop/junit.xml
          reporter: java-junit
          fail-on-error: false
      - name: Upload desktop JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-desktop
          path: artifacts/test-reports/desktop/junit.xml
          if-no-files-found: warn
