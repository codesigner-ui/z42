name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual trigger: force a nightly republish from the latest main WITHOUT a new
  # push. This is the escape hatch for the xtask↔nightly bootstrap cycle — after
  # a zbc/zpkg bump (or an xtask change needing a newer stdlib API), the
  # download-bootstrap jobs (vm-jit/bench) transiently fail on the OLD nightly,
  # but publish-nightly is decoupled from them (source-bootstrapped only) and
  # republishes a compatible nightly so the next run self-heals. Run via the
  # Actions "Run workflow" button or: gh workflow run CI --ref main
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a new one starts
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # migrate-scripts-to-z42: bootstrap the native build CLI (replaces
      # `just build`). Builds the compiler (slnx) + release z42vm + a primer
      # stdlib, compiles xtask.zpkg, then `xtask build stdlib` for the final flat
      # dist + index.json. After this, every other step drives work through
      # `z42vm xtask.zpkg …`. Runs on all OSes (git-bash on Win).
      - name: Bootstrap (compiler + runtime + stdlib + xtask.zpkg)
        shell: bash
        run: |
          set -euo pipefail
          dotnet build src/compiler/z42.slnx --nologo -v quiet
          cargo build --release --manifest-path src/runtime/Cargo.toml
          libs="$PWD/artifacts/build/libraries/dist/release"
          # PRIMER (raw C# compiler, no z42 program): build stdlib from source so
          # xtask can COMPILE its `using Std.*` (z42c reads .zsym; index.json — the
          # VM lookup index — is regenerated below by `xtask build stdlib`).
          if [ ! -f "$libs/z42.core.zpkg" ]; then
            ( cd src/libraries && dotnet run --project ../compiler/z42.Driver --verbosity quiet -- build --workspace --release )
            mkdir -p "$libs"
            for d in artifacts/build/libraries/*/release/dist; do
              cp -f "$d"/*.zpkg "$d"/*.zsym "$libs/" 2>/dev/null || true
            done
          fi
          Z42_LIBS="$libs" dotnet run --project src/compiler/z42.Driver --verbosity quiet -- build scripts/xtask.z42.toml --release
          # build-stdlib logic folded into xtask (xtask_stdlib.z42): workspace build
          # (cached) + flat view + index.json, in-process.
          vm="$PWD/artifacts/build/runtime/release/z42vm"; [ -f "$vm.exe" ] && vm="$vm.exe"
          Z42_LIBS="$libs" Z42_PORTABLE_VM="$vm" "$vm" artifacts/xtask/xtask.zpkg -- build stdlib

      # migrate-scripts-to-z42: version-drift check via xtask (replaces the
      # feature-matrix `bash scripts/check-versions-drift.sh` step). ubuntu only —
      # the check is OS-independent (versions.toml + zbc/zpkg/gradle/Package.swift
      # version constants). Reuses the from-source xtask bootstrapped above.
      - name: Check versions.toml drift (z42 xtask.zpkg deps check)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          Z42_PORTABLE_VM="$PWD/artifacts/build/runtime/release/z42vm" \
          Z42_LIBS="$PWD/artifacts/build/libraries/dist/release" \
            artifacts/build/runtime/release/z42vm artifacts/xtask/xtask.zpkg -- deps check

      # add-tests-bench-manifest-config Phase 6.1 (2026-06-06): release guard.
      # xtask's dir-mode tests / benches produce synthetic
      # `<lib>.test.<unit>.zpkg` / `<lib>.bench.<unit>.zpkg` artifacts under
      # an xtask-controlled output_dir (currently /tmp/.../xtask-testlib*/);
      # they must NEVER land in the production `dist/` tree under
      # `artifacts/build/libraries/<lib>/<profile>/`. A regression here
      # (e.g. forgotten output_dir override in a future xtask path) would
      # silently ship test scaffolding to end users via the SDK package.
      # The guard scans every per-lib dist tree and fails on the first
      # `.test.` / `.bench.` infix hit. ubuntu-only (path semantics
      # identical across platforms; one check is enough).
      - name: Release guard (no .test./.bench. zpkgs in dist/)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          # Forward: production dist/ must not contain test/bench zpkgs.
          # Excludes the per-lib tests/dist/ and bench/dist/ subdirs by
          # requiring the `/dist/` path component to NOT be preceded by
          # `/tests/` or `/bench/`.
          violators=$(
            find artifacts/build/libraries -type f \
              \( -name '*.test.*.zpkg' -o -name '*.bench.*.zpkg' \) \
              -path '*/dist/*' \
              ! -path '*/tests/dist/*' \
              ! -path '*/bench/dist/*' \
              2>/dev/null || true
          )
          if [ -n "$violators" ]; then
            echo "::error::test/bench harness zpkgs leaked into release dist/:"
            echo "$violators"
            exit 1
          fi
          echo "release guard (forward): 0 .test./.bench. zpkgs in production dist/ (OK)"

      # Reverse guard: anything inside <lib>/<profile>/tests/dist/ MUST
      # carry the `.test.` infix; same for bench/dist/. Belt-and-suspenders
      # against a future refactor that accidentally writes a production
      # zpkg into the test/bench output tree. add-tests-bench-manifest-config
      # Phase 6.1.2 (2026-06-06).
      - name: Release guard (tests/dist contents are .test. only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          # tests/dist/ must contain only `.test.` zpkgs
          tests_strangers=$(
            find artifacts/build/libraries -path '*/tests/dist/*' \
              -type f -name '*.zpkg' ! -name '*.test.*.zpkg' \
              2>/dev/null || true
          )
          # bench/dist/ must contain only `.bench.` zpkgs
          bench_strangers=$(
            find artifacts/build/libraries -path '*/bench/dist/*' \
              -type f -name '*.zpkg' ! -name '*.bench.*.zpkg' \
              2>/dev/null || true
          )
          if [ -n "$tests_strangers" ] || [ -n "$bench_strangers" ]; then
            echo "::error::non-harness zpkg appeared in tests/dist/ or bench/dist/:"
            [ -n "$tests_strangers" ] && echo "$tests_strangers"
            [ -n "$bench_strangers" ] && echo "$bench_strangers"
            exit 1
          fi
          echo "release guard (reverse): tests/dist + bench/dist contain only harness zpkgs (OK)"

      # Test on Unix runners (existing scripts are bash).
      # --parallel: wave-based stage-level concurrency (W1/W2/W3).
      # --jobs=4: intra-stage parallelism for test-lib.sh and test-vm.sh;
      #   capped at 4 to stay within the runner's vCPU budget (ubuntu=4,
      #   macos-15=3) even when two stages run concurrently in a wave.
      # migrate-scripts-to-z42: the GREEN gate now runs through the native
      # z42 build CLI (xtask) instead of test-all.sh. Bootstrap = release z42vm
      # (to run xtask.zpkg) + compile xtask.zpkg; then `xtask test all` (which
      # itself rebuilds stdlib/compiler/zbc + runs compiler+vm+cross-zpkg+stdlib,
      # parallelized via --jobs=4). z42c/stdlib from the prior steps are reused.
      - name: Test (z42 xtask.zpkg test all)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/ci-logs
          Z42_PORTABLE_VM="$PWD/artifacts/build/runtime/release/z42vm" \
          Z42_LIBS="$PWD/artifacts/build/libraries/dist/release" \
            artifacts/build/runtime/release/z42vm artifacts/xtask/xtask.zpkg -- test all 2>&1 | tee artifacts/ci-logs/test-all.log
          exit "${PIPESTATUS[0]}"

      # diag-ci-test-log-upload (2026-05-30): the wave-failed stage prints
      # `stage outputs preserved at: /tmp/...` paths that disappear when
      # the runner is recycled. Capture them as an artifact so we can
      # inspect failure mode without admin-only log access (the public
      # actions/jobs API only surfaces "exit code 1" annotations).
      - name: Upload test logs on failure
        if: failure() && matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          path: |
            artifacts/ci-logs/
            /tmp/z42-test-all.*
            /var/folders/*/*/T/z42-test-all.*
          retention-days: 7
          if-no-files-found: warn

      # Windows pre-test: regenerate golden source.zbc fixtures the same way
      # Linux/macOS do via test-vm.sh → regen-golden-tests.sh. The repo only
      # commits 6 source.zbc files; the remaining ~30 are regen-on-demand.
      # Without this step `cargo test --test zbc_compat` fails with "expected
      # ≥ 50 golden tests with source.zbc, found 6". --no-stdlib because the
      # "Build stdlib" step above already populated artifacts/build/libs/release/.
      - name: Regen golden zbc fixtures (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"; [ -f "$vm.exe" ] && vm="$vm.exe"
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$PWD/artifacts/build/libraries/dist/release" \
            "$vm" artifacts/xtask/xtask.zpkg -- regen --no-stdlib

      # Windows: smoke test only (cargo + dotnet are cross-platform; bash scripts not)
      # shell: pwsh (default on windows-latest) — dotnet test spawns testhost.exe,
      # a native Windows process that crashes silently when its console handle is
      # inherited from MSYS2/Git Bash. PowerShell gives it a proper Windows console.
      #
      # --blame-hang-timeout 5m: any individual test that takes >5 min triggers a
      # process dump + fails fast. Catches stdout/stderr pipe-buffer deadlocks
      # (the historic Windows hang root cause) instead of letting them burn the
      # 3 h job budget. Without this the job hangs until concurrency cancel.
      # RUST_MIN_STACK=8388608: Windows defaults test threads to a 1 MB stack
      # while Linux/macOS give 8 MB. Crypto/BigInt/JIT tests run on the test
      # thread itself (not spawned), and a single deep call (RSA ModPow,
      # Cranelift codegen, Blake3 Merkle recursion) exhausts 1 MB → silent
      # STATUS_ACCESS_VIOLATION (0xc0000005) on the guard page. Match the
      # other platforms' 8 MB to remove this class of cross-platform flake.
      #
      # --test-threads=1: the runtime --lib unit tests have a pre-existing
      # cross-thread memory-corruption race (reproducible on macOS too:
      # `cargo test --lib corelib` SIGSEGVs under parallel scheduling while
      # `--test-threads=1` passes 736/736). RUST_MIN_STACK=8 MB only lowers
      # the crash probability, it does not eliminate it — the corruption is
      # not a pure stack overflow. cargo test is run ONLY on this Windows
      # step (Linux/macOS exercise the VM via test-all.sh goldens, not the
      # Rust unit harness), so serializing here is the targeted stopgap.
      # TODO: root-cause the race (suspect: GC region raw-pointer Send/Sync
      # unsoundness with multiple concurrent VmCores) and restore parallelism.
      - name: Smoke test (Windows)
        if: matrix.os == 'windows-latest'
        env:
          RUST_MIN_STACK: '8388608'
        run: |
          dotnet test src/compiler/z42.Tests/z42.Tests.csproj --blame-hang-timeout 5m --blame-hang-dump-type mini
          cargo test --manifest-path src/runtime/Cargo.toml -- --test-threads=1

      # ── host RID SDK package smoke ──
      # Host-RID package via `z42 xtask.zpkg build package` (stdlib already built above).
      # Verifies the per-arch flat SDK layout (Phase 1.1 + 1.4 + drop-android-32bit)
      # works end-to-end on each desktop runner. Cross-platform RIDs (iOS / Android /
      # browser-wasm) deferred to a later CI matrix.
      #
      # shell: bash everywhere — on windows-latest this uses Git Bash (per
      # docs/workflow/windows.md; .gitattributes ensures LF on .sh).

      - name: Package host RID (z42 xtask.zpkg build package)
        shell: bash
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"; [ -f "$vm.exe" ] && vm="$vm.exe"
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$PWD/artifacts/build/libraries/dist/release" \
            "$vm" artifacts/xtask/xtask.zpkg -- build package release

      - name: Verify package manifest + native artifacts
        shell: bash
        run: |
          set -euo pipefail
          pkg_dir=$(ls -d artifacts/packages/z42-*-release | head -1)
          [ -d "$pkg_dir" ] || { echo "error: no package produced"; exit 1; }
          echo "Package: $pkg_dir"
          test -f "$pkg_dir/manifest.toml"        || { echo "missing manifest.toml"; exit 1; }
          test -d "$pkg_dir/libs"                 || { echo "missing libs/"; exit 1; }
          test -d "$pkg_dir/native/include"       || { echo "missing native/include/"; exit 1; }
          test -d "$pkg_dir/examples/hello_c"     || { echo "missing examples/hello_c/"; exit 1; }
          test -f "$pkg_dir/examples/hello_c/hello.zbc" || { echo "missing hello.zbc"; exit 1; }
          # bin/z42c (or z42c.exe) must be present + executable
          if [ -f "$pkg_dir/bin/z42c.exe" ]; then
              echo "✓ bin/z42c.exe ($(du -h "$pkg_dir/bin/z42c.exe" | cut -f1))"
          elif [ -f "$pkg_dir/bin/z42c" ]; then
              echo "✓ bin/z42c ($(du -h "$pkg_dir/bin/z42c" | cut -f1))"
          else
              echo "error: bin/z42c[.exe] missing"; ls -la "$pkg_dir/bin/"; exit 1
          fi
          # add-z42-compression (2026-05-22): libz42_compression cdylib must
          # ship in native/ so z42vm can dlopen it from <pkg>/native/ at
          # startup. .a counterpart is for mobile / future static-link
          # integrators; verify it too.
          if [ -f "$pkg_dir/native/libz42_compression.dylib" ] \
             || [ -f "$pkg_dir/native/libz42_compression.so" ] \
             || [ -f "$pkg_dir/native/z42_compression.dll" ]; then
              echo "✓ native/libz42_compression.* (dlopen target)"
          else
              echo "error: native/libz42_compression.{dylib,so,dll} missing — z42.compression facade will fail with 'unknown builtin' at runtime"
              ls -la "$pkg_dir/native/"; exit 1
          fi
          test -f "$pkg_dir/native/libz42_compression.a" \
              && echo "✓ native/libz42_compression.a (staticlib for mobile / future bundled link)"
          # z42.compression.zpkg must ship in libs/ — the facade resolves
          # Std.Compression / Std.Archive through it.
          test -f "$pkg_dir/libs/z42.compression.zpkg" \
              || { echo "error: libs/z42.compression.zpkg missing"; exit 1; }
          echo "✓ libs/z42.compression.zpkg"
          echo "--- manifest.toml ---"
          cat "$pkg_dir/manifest.toml"

      - name: Upload host package
        uses: actions/upload-artifact@v4
        with:
          name: z42-host-package-${{ matrix.os }}
          path: artifacts/packages/z42-*-release/
          retention-days: 14
          if-no-files-found: error

  # ── VM cross-mode consistency (0.3.0 退出标准) ───────────────────────────
  # `just test` in build-and-test only exercises interp mode (test-vm + test-cross-zpkg
  # default = interp). This job re-runs both golden suites under JIT mode to
  # catch interp/JIT divergence (different opcode handling, codegen bugs, etc.)
  # before they reach main. Single linux-x64 lane is enough — cranelift JIT
  # behaviour is the same across desktop hosts; reproducing on every OS would
  # be wasted CI minutes.
  vm-jit-consistency:
    name: vm-jit-consistency (linux-x64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (shared key with build-and-test)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - uses: ./.github/actions/xtask-bootstrap

      - name: VM goldens + cross-zpkg — JIT mode (xtask)
        shell: bash
        run: |
          set -euo pipefail
          # downloaded z42 runs xtask; xtask builds the current toolchain + runs
          # the JIT goldens/cross-zpkg on the current z42vm (no --no-rebuild).
          "$PWD/.z42/z42" artifacts/xtask/xtask.zpkg -- test vm jit --jobs=4
          "$PWD/.z42/z42" artifacts/xtask/xtask.zpkg -- test cross-zpkg jit

  # P1.D.2: PR-only bench smoke. Runs `just bench-e2e --quick` on linux,
  # uploads bench/results/e2e.json as artifact for manual inspection.
  # No diff/gate yet — that's P1.D.3 (gh-pages baseline + automatic PR diff).
  # Note: noisy CI runners make 5% gate unreliable; current smoke just verifies
  # bench infra works in CI. Manual download + `xtask bench --diff` for now.
  bench-e2e:
    name: bench-e2e (smoke, PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install hyperfine
        run: |
          wget -q https://github.com/sharkdp/hyperfine/releases/download/v1.20.0/hyperfine_1.20.0_amd64.deb
          sudo dpkg -i hyperfine_1.20.0_amd64.deb

      - name: Cache cargo (shared key with build-and-test)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - uses: ./.github/actions/xtask-bootstrap

      - name: Run e2e bench (quick mode, xtask)
        shell: bash
        run: |
          set -euo pipefail
          "$PWD/.z42/z42" artifacts/xtask/xtask.zpkg -- bench --quick

      - name: Upload bench results
        uses: actions/upload-artifact@v4
        with:
          name: bench-e2e-results-${{ runner.os }}
          path: bench/results/e2e.json
          retention-days: 30
          if-no-files-found: error

      # ── P1.D.4: informational diff against main baseline ──
      # Fetch latest baseline from bench-baselines branch (published by
      # bench-update.yml on main pushes). Tolerates absence (first PR before
      # any main push has happened, or fetch failure).
      - name: Fetch main baseline
        id: fetch-baseline
        continue-on-error: true
        run: |
          set -euo pipefail
          if git fetch origin bench-baselines:bench-baselines 2>/dev/null; then
            if git show bench-baselines:baselines/e2e-ubuntu-latest.json > /tmp/main-baseline.json 2>/dev/null; then
              if [[ -s /tmp/main-baseline.json ]]; then
                echo "BASELINE_AVAILABLE=true" >> "$GITHUB_ENV"
                echo "→ Fetched main baseline ($(wc -c < /tmp/main-baseline.json) bytes)"
              fi
            fi
          fi
          if [[ -z "${BASELINE_AVAILABLE:-}" ]]; then
            echo "→ No main baseline available (yet)"
          fi

      - name: Diff vs main baseline (informational, never fails)
        if: env.BASELINE_AVAILABLE == 'true'
        continue-on-error: true
        run: |
          {
            echo "## Bench diff vs main"
            echo ""
            echo '```'
            "$PWD/.z42/z42" artifacts/xtask/xtask.zpkg -- bench --diff \
              --current  bench/results/e2e.json \
              --baseline /tmp/main-baseline.json \
              --threshold-time   0.15 \
              --threshold-memory 0.20 \
              2>&1 || true
            echo '```'
            echo ""
            echo "_Thresholds inflated to 15% (time) / 20% (memory) — CI runners are noisy._"
            echo "_Informational only: does not fail this check._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Note when baseline absent
        if: env.BASELINE_AVAILABLE != 'true'
        run: |
          {
            echo "## Bench diff vs main"
            echo ""
            echo "ℹ️ No baseline available on \`bench-baselines\` branch yet."
            echo ""
            echo "First push to main triggers \`.github/workflows/bench-update.yml\`,"
            echo "which seeds the baseline. Subsequent PRs will see auto-diff here."
          } >> "$GITHUB_STEP_SUMMARY"

  # 2026-05-07 add-runtime-feature-flags (P4.1): verify all 4 feature presets
  # compile on host target. P4.2/P4.3/P4.4 will add real cross-compile jobs
  # (wasm32-unknown-unknown / aarch64-apple-ios / aarch64-linux-android).
  feature-matrix:
    name: feature-matrix (P4.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # migrate-scripts-to-z42: feature presets are plain cargo feature combos
      # (was `just build-*-feature`) — inlined so this job needs no `just`.
      - name: Build interp-only (no cranelift)
        run: cargo build --release --manifest-path src/runtime/Cargo.toml --no-default-features --features interp-only

      - name: Build wasm preset (host target)
        run: cargo build --release --manifest-path src/runtime/Cargo.toml --no-default-features --features wasm

      - name: Build ios preset (host target)
        run: cargo build --release --manifest-path src/runtime/Cargo.toml --no-default-features --features ios

      - name: Build android preset (host target)
        run: cargo build --release --manifest-path src/runtime/Cargo.toml --no-default-features --features android

      - name: Verify cranelift excluded under interp-only
        run: |
          if cargo tree --manifest-path src/runtime/Cargo.toml \
             --no-default-features --features interp-only 2>&1 | grep -q "cranelift"; then
            echo "ERROR: cranelift still present in interp-only build" >&2
            exit 1
          fi

      # (versions.toml drift check moved to build-and-test via
      # `z42 xtask.zpkg deps check` — migrate-scripts-to-z42.)

  # ── iOS packaging ──────────────────────────────────────────────────────
  # Packages ios-arm64 + iossim-arm64. Requires Xcode (pre-installed on
  # macos-15 arm64) + iOS Rust targets. The source bootstrap also builds z42c.
  package-ios:
    name: package-ios
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust + iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ios-
            ${{ runner.os }}-cargo-

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - uses: ./.github/actions/xtask-bootstrap-source

      - name: Package ios-arm64 + iossim-arm64 (z42 xtask.zpkg build package)
        shell: bash
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"
          libs="$PWD/artifacts/build/libraries/dist/release"
          for rid in ios-arm64 iossim-arm64; do
            Z42_PORTABLE_VM="$vm" Z42_LIBS="$libs" \
              "$vm" artifacts/xtask/xtask.zpkg -- build package release --rid "$rid"
          done

      - name: Verify iOS packages
        run: |
          set -euo pipefail
          for rid in ios-arm64 iossim-arm64; do
            pkg_dir=$(ls -d artifacts/packages/z42-*-${rid}-release | head -1)
            [ -d "$pkg_dir" ] || { echo "error: no $rid package"; exit 1; }
            echo "Package: $pkg_dir"
            test -f "$pkg_dir/manifest.toml"              || { echo "missing manifest.toml"; exit 1; }
            test -d "$pkg_dir/libs"                       || { echo "missing libs/"; exit 1; }
            test -f "$pkg_dir/native/libz42.a"            || { echo "missing native/libz42.a"; exit 1; }
            test -d "$pkg_dir/native/Z42VM.xcframework"   || { echo "missing Z42VM.xcframework/"; exit 1; }
            test -d "$pkg_dir/native/include"             || { echo "missing native/include/"; exit 1; }
            test -d "$pkg_dir/Sources/Z42VM"              || { echo "missing Sources/Z42VM/"; exit 1; }
            test -f "$pkg_dir/Package.swift"              || { echo "missing Package.swift"; exit 1; }
            test -f "$pkg_dir/examples/hello_c/hello.zbc" || { echo "missing hello.zbc"; exit 1; }
            # lipo: verify xcframework contains an arm64 Mach-O static archive
            xcfw_lib=$(find "$pkg_dir/native/Z42VM.xcframework" -name "libz42.a" | head -1)
            [ -f "$xcfw_lib" ] || { echo "error: libz42.a missing inside xcframework"; exit 1; }
            lipo_out=$(lipo -info "$xcfw_lib")
            echo "$lipo_out" | grep -q "arm64" \
              || { echo "error: $rid xcframework wrong arch: $lipo_out"; exit 1; }
            echo "✓ $rid lipo: $lipo_out"
            # swift package describe: parse Package.swift without building
            swift package --package-path "$pkg_dir" describe > /dev/null
            echo "✓ $rid Package.swift valid"
          done

      - name: Upload iOS packages
        uses: actions/upload-artifact@v4
        with:
          name: z42-ios-packages
          path: artifacts/packages/
          retention-days: 14
          if-no-files-found: error

  # ── Android packaging ───────────────────────────────────────────────────
  # Packages android-arm64 + android-x64 via cargo-ndk + NDK r26d.
  package-android:
    name: package-android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      # local-cache: false — local-cache produced an incomplete ANDROID_NDK_HOME
      # (clang missing under toolchains/llvm/prebuilt/) causing libffi-sys's
      # configure to fail. Fresh download is ~2 min slower but reliable.
      - name: Setup Android NDK r26d
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          local-cache: false

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-
            ${{ runner.os }}-cargo-

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - uses: ./.github/actions/xtask-bootstrap-source

      - name: Package android-arm64 + android-x64 (z42 xtask.zpkg build package)
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"
          libs="$PWD/artifacts/build/libraries/dist/release"
          for rid in android-arm64 android-x64; do
            Z42_PORTABLE_VM="$vm" Z42_LIBS="$libs" \
              "$vm" artifacts/xtask/xtask.zpkg -- build package release --rid "$rid"
          done

      - name: Verify Android packages
        run: |
          set -euo pipefail
          for rid in android-arm64 android-x64; do
            pkg_dir=$(ls -d artifacts/packages/z42-*-${rid}-release | head -1)
            [ -d "$pkg_dir" ] || { echo "error: no $rid package"; exit 1; }
            echo "Package: $pkg_dir"
            test -f "$pkg_dir/manifest.toml"                           || { echo "missing manifest.toml"; exit 1; }
            test -d "$pkg_dir/libs"                                    || { echo "missing libs/"; exit 1; }
            test -f "$pkg_dir/native/libz42_platform_android.so"       || { echo "missing .so"; exit 1; }
            test -f "$pkg_dir/native/libz42_platform_android.a"        || { echo "missing .a"; exit 1; }
            test -d "$pkg_dir/native/include"                          || { echo "missing native/include/"; exit 1; }
            test -d "$pkg_dir/kotlin/io/z42/vm"                        || { echo "missing kotlin/io/z42/vm/"; exit 1; }
            test -f "$pkg_dir/cpp/z42vm_jni.c"                         || { echo "missing cpp/z42vm_jni.c"; exit 1; }
            test -f "$pkg_dir/examples/hello_c/hello.zbc"              || { echo "missing hello.zbc"; exit 1; }
            # Verify ELF architecture of the shared library
            so="$pkg_dir/native/libz42_platform_android.so"
            file_out=$(file "$so")
            case "$rid" in
              android-arm64)
                echo "$file_out" | grep -q "ARM aarch64" \
                  || { echo "error: $rid .so wrong arch: $file_out"; exit 1; }
                echo "✓ $rid ELF arch: ARM aarch64" ;;
              android-x64)
                echo "$file_out" | grep -q "x86-64" \
                  || { echo "error: $rid .so wrong arch: $file_out"; exit 1; }
                echo "✓ $rid ELF arch: x86-64" ;;
            esac
          done

      - name: Upload Android packages
        uses: actions/upload-artifact@v4
        with:
          name: z42-android-packages
          path: artifacts/packages/
          retention-days: 14
          if-no-files-found: error

  # ── wasm packaging ──────────────────────────────────────────────────────
  # Packages browser-wasm via wasm-pack (no Node.js needed — wasm-pack build
  # only generates JS glue, it doesn't execute it).
  # platforms/wasm/build.sh produces pkg-web/ + pkg-nodejs/ (required by
  # before `xtask build package` can assemble the wasm SDK package).
  package-wasm:
    name: package-wasm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack + wasm-tools
        run: cargo install wasm-pack wasm-tools --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - uses: ./.github/actions/xtask-bootstrap-source

      - name: Build wasm platform (pkg-web/ + pkg-nodejs/ via wasm-pack)
        run: ./build.sh
        working-directory: src/toolchain/host/platforms/wasm

      - name: Package browser-wasm (z42 xtask.zpkg build package)
        shell: bash
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$PWD/artifacts/build/libraries/dist/release" \
            "$vm" artifacts/xtask/xtask.zpkg -- build package release --rid browser-wasm

      - name: Verify wasm package + WebAssembly validation
        run: |
          set -euo pipefail
          pkg_dir=$(ls -d artifacts/packages/z42-*-browser-wasm-release | head -1)
          [ -d "$pkg_dir" ] || { echo "error: no browser-wasm package"; exit 1; }
          echo "Package: $pkg_dir"
          test -f "$pkg_dir/manifest.toml"                  || { echo "missing manifest.toml"; exit 1; }
          test -d "$pkg_dir/libs"                           || { echo "missing libs/"; exit 1; }
          test -f "$pkg_dir/native/z42_wasm_bg.wasm"        || { echo "missing z42_wasm_bg.wasm"; exit 1; }
          test -f "$pkg_dir/native/libz42.a"                || { echo "missing native/libz42.a"; exit 1; }
          test -d "$pkg_dir/pkg-web"                        || { echo "missing pkg-web/"; exit 1; }
          test -d "$pkg_dir/pkg-nodejs"                     || { echo "missing pkg-nodejs/"; exit 1; }
          test -f "$pkg_dir/package.json"                   || { echo "missing package.json"; exit 1; }
          test -f "$pkg_dir/examples/hello_c/hello.zbc"     || { echo "missing hello.zbc"; exit 1; }
          echo "✓ browser-wasm manifest OK"
          # WebAssembly spec validation via wasm-tools (Bytecode Alliance).
          # Validates binary encoding + all active wasm proposals; no JS runtime needed.
          wasm="$pkg_dir/native/z42_wasm_bg.wasm"
          wasm-tools validate "$wasm"
          export_count=$(wasm-tools print "$wasm" | grep -c '(export' || true)
          [ "$export_count" -gt 0 ] || { echo "error: no exports in wasm module"; exit 1; }
          echo "✓ wasm valid — $export_count exports (wasm-tools)"

      - name: Upload wasm package
        uses: actions/upload-artifact@v4
        with:
          name: z42-wasm-package
          path: artifacts/packages/
          retention-days: 14
          if-no-files-found: error

  # ── Nightly rolling pre-release ────────────────────────────────────────
  # On every push to main, repackage all 9 RID artifacts (host ×4 + ios ×2 +
  # android ×2 + wasm) into archives and force-replace a single `nightly`
  # GitHub Release. The tag URL stays stable so downstream consumers can pin to:
  #
  #   https://github.com/<owner>/z42/releases/download/nightly/z42-nightly-<rid>.{tar.gz,zip}
  #
  # Not signed. Marked --prerelease. Skipped on PRs (token + fork-PR limitations).
  publish-nightly:
    name: publish-nightly
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    # IMPORTANT — do NOT add vm-jit-consistency / bench-e2e (or any other
    # download-bootstrap job that runs xtask off the prebuilt .z42) to `needs`.
    # Those jobs bootstrap xtask from the PREVIOUS nightly, so on a zbc/zpkg bump
    # (or an xtask change needing a newer stdlib API) they transiently fail until
    # a compatible nightly exists — and the only thing that produces one is THIS
    # job. Gating publish on them is a deadlock. publish-nightly therefore depends
    # ONLY on jobs that build from CURRENT source (build-and-test bootstraps xtask
    # via cargo+z42c, not download; package-* use the source bootstrap +
    # package.sh), so it always republishes a compatible nightly and the
    # download-bootstrap jobs self-heal on the next run. JIT correctness is still
    # gated here via build-and-test's `xtask test all` (vm goldens in interp+jit).
    needs:
      - build-and-test
      - feature-matrix
      - package-ios
      - package-android
      - package-wasm
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh release create / delete
    steps:
      - uses: actions/checkout@v4

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-raw
          pattern: 'z42-*-package*'
          merge-multiple: true

      - name: Show downloaded layout (debug)
        run: |
          echo "--- dist-raw top level ---"
          ls -la dist-raw/ || true
          echo "--- z42-*-release dirs anywhere under dist-raw/ ---"
          find dist-raw -type d -name 'z42-*-release' | sort || true

      - name: Layout + archive each RID package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/packages artifacts/release
          # Find package dirs regardless of nesting depth (upload-artifact v4
          # may preserve or strip the source-path prefix depending on the
          # upstream `path:` shape).
          mapfile -t pkg_dirs < <(find dist-raw -type d -name 'z42-*-release' | sort -u)
          [ "${#pkg_dirs[@]}" -gt 0 ] \
              || { echo "error: no z42-*-release dirs under dist-raw/"; find dist-raw -maxdepth 3 -type d; exit 1; }
          echo "→ Found ${#pkg_dirs[@]} package dirs"
          for src in "${pkg_dirs[@]}"; do
              name=$(basename "$src")          # z42-<v>-<rid>-release
              stripped=${name#z42-}            # <v>-<rid>-release
              stripped=${stripped%-release}    # <v>-<rid>
              # rid = last segment matching a known suffix (handles linux-x64,
              # iossim-arm64, browser-wasm). iOS device (ios-arm64) and simulator
              # (iossim-arm64) now use distinct prefixes, so suffix matching is
              # unambiguous regardless of list order.
              rid=""
              for candidate in linux-x64 linux-arm64 macos-arm64 windows-x64 \
                               iossim-arm64 ios-arm64 \
                               android-arm64 android-x64 browser-wasm; do
                  if [[ "$stripped" == *-"$candidate" ]]; then
                      rid="$candidate"
                      break
                  fi
              done
              [ -n "$rid" ] || { echo "error: cannot infer RID from $name"; exit 1; }
              # Rename to neutral version label so the download URL stays
              # stable across commits.
              new_name="z42-nightly-${rid}-release"
              dst="artifacts/packages/$new_name"
              rm -rf "$dst"
              cp -R "$src" "$dst"
              if [ "$rid" = "windows-x64" ]; then
                  archive="artifacts/release/z42-nightly-${rid}.zip"
                  tar -C artifacts/packages -a -cf "$archive" "$new_name"
              else
                  archive="artifacts/release/z42-nightly-${rid}.tar.gz"
                  tar -C artifacts/packages -czf "$archive" "$new_name"
              fi
              echo "✓ ${rid} → $(basename "$archive") ($(du -h "$archive" | cut -f1))"
          done

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts/release
          shasum -a 256 z42-nightly-*.tar.gz z42-nightly-*.zip 2>/dev/null | sort -k2 > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Force-replace nightly release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          short_sha=$(git rev-parse --short HEAD)
          today=$(date -u +%Y-%m-%d)
          # Delete prior nightly (release + tag); ignore if absent.
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          notes=$(cat <<EOF
          **Rolling pre-release** built from \`main\` on ${today} (commit \`${short_sha}\`).

          - **Unsigned** — do not use for production.
          - **Replaced on every push to main** — URL stays stable, contents change.
          - For tagged releases see [Releases](../../releases?q=v).

          ## Downloads (host RIDs)

          | Platform | Archive |
          |----------|---------|
          | Linux x64 | \`z42-nightly-linux-x64.tar.gz\` |
          | Linux arm64 | \`z42-nightly-linux-arm64.tar.gz\` |
          | macOS arm64 | \`z42-nightly-macos-arm64.tar.gz\` |
          | Windows x64 | \`z42-nightly-windows-x64.zip\` |

          ## Downloads (mobile + wasm)

          | Platform | Archive |
          |----------|---------|
          | iOS arm64 (device) | \`z42-nightly-ios-arm64.tar.gz\` |
          | iOS arm64 (simulator) | \`z42-nightly-iossim-arm64.tar.gz\` |
          | Android arm64 | \`z42-nightly-android-arm64.tar.gz\` |
          | Android x64 | \`z42-nightly-android-x64.tar.gz\` |
          | Browser WASM | \`z42-nightly-browser-wasm.tar.gz\` |

          Verify: \`shasum -a 256 -c SHA256SUMS --ignore-missing\`
          EOF
          )
          gh release create nightly --prerelease --target "$GITHUB_SHA" \
            --title "Nightly (main @ ${short_sha} · ${today})" \
            --notes "$notes" \
            artifacts/release/SHA256SUMS artifacts/release/z42-nightly-*
