name: Release

# Tag-triggered cross-platform SDK package publish.
#
# Triggers on tag matching v[0-9]+.[0-9]+.[0-9]+* (e.g. v0.2.5, v0.2.5-rc1).
# Pre-1.0 versions and tags containing '-' are published as GitHub prereleases.
#
# Pipeline: verify (tag ↔ versions.toml) → package × 9 RIDs → publish (with SHA256SUMS).
# See docs/spec/changes/add-release-automation/ (until archived) or
# docs/spec/archive/<date>-add-release-automation/.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (must match versions.toml [project].version, e.g. 0.1.0)'
        required: true
        type: string

permissions:
  contents: write   # gh release create

jobs:
  # ── 1. Verify tag matches versions.toml [project].version ──────────────
  verify:
    name: verify
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract + verify version
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            tag="${GITHUB_REF#refs/tags/v}"
          else
            tag="${{ inputs.version }}"
          fi
          # read versions.toml [project].version (no versions.sh; this job has no
          # z42 toolchain — same awk pattern as scripts/install-z42.sh). Split on
          # the quote so a trailing comment (`version = "0.2.0"  # ...`) doesn't
          # leak into the value (the old gsub /.*"|".*/ kept the comment).
          repo_version=$(awk '
            /^\[project\]/ {inblock=1; next}
            /^\[/ {inblock=0}
            inblock && /^version/ {split($0, a, "\""); print a[2]; exit}
          ' versions.toml)
          if [ "$tag" != "$repo_version" ]; then
            echo "drift: tag=$tag versions.toml=$repo_version" >&2
            exit 1
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"
          echo "✓ release version: $tag"

  # ── 2. Build per-RID SDK package + archive ─────────────────────────────
  package:
    name: package (${{ matrix.rid }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: linux-x64,      runs-on: ubuntu-latest,      rust-target: x86_64-unknown-linux-gnu }
          - { rid: linux-arm64,    runs-on: ubuntu-24.04-arm,   rust-target: aarch64-unknown-linux-gnu }
          - { rid: macos-arm64,    runs-on: macos-15,           rust-target: aarch64-apple-darwin }
          - { rid: windows-x64,    runs-on: windows-latest,     rust-target: x86_64-pc-windows-msvc }
          - { rid: ios-arm64,      runs-on: macos-15,           rust-target: aarch64-apple-ios }
          - { rid: iossim-arm64,  runs-on: macos-15,           rust-target: aarch64-apple-ios-sim }
          - { rid: android-arm64,  runs-on: ubuntu-latest,      rust-target: aarch64-linux-android }
          - { rid: android-x64,    runs-on: ubuntu-latest,      rust-target: x86_64-linux-android }
          - { rid: browser-wasm,   runs-on: ubuntu-latest,      rust-target: wasm32-unknown-unknown }
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/runtime/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-release-${{ matrix.rid }}-${{ hashFiles('src/runtime/Cargo.lock', 'src/runtime/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-release-${{ matrix.rid }}-
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Android-only: cargo-ndk + NDK r26d
      - name: Install cargo-ndk
        if: startsWith(matrix.rid, 'android-')
        run: cargo install cargo-ndk --locked

      # local-cache: false — local-cache: true produced an incomplete
      # ANDROID_NDK_HOME directory (clang missing under toolchains/llvm/prebuilt/),
      # causing libffi-sys's configure to fail with "C compiler cannot create
      # executables". Fresh download every run is ~2 min slower but reliable.
      - name: Setup Android NDK r26d
        if: startsWith(matrix.rid, 'android-')
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          local-cache: false

      # wasm-only: wasm-pack + wasm-tools
      - name: Install wasm-pack + wasm-tools
        if: matrix.rid == 'browser-wasm'
        run: cargo install wasm-pack wasm-tools --locked

      - uses: ./.github/actions/xtask-bootstrap-source

      # wasm-only: pre-build pkg-web/ + pkg-nodejs/ via wasm-pack (WasmBackend)
      - name: Build wasm platform
        if: matrix.rid == 'browser-wasm'
        shell: bash
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$PWD/artifacts/build/libraries/dist/release" \
            "$vm" artifacts/xtask/xtask.zpkg -- test platform wasm build

      - name: Package ${{ matrix.rid }} (z42 xtask.zpkg package)
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail
          vm="$PWD/artifacts/build/runtime/release/z42vm"; [ -f "$vm.exe" ] && vm="$vm.exe"
          Z42_PORTABLE_VM="$vm" Z42_LIBS="$PWD/artifacts/build/libraries/dist/release" \
            "$vm" artifacts/xtask/xtask.zpkg -- package release --rid ${{ matrix.rid }}

      - name: Archive
        shell: bash
        run: |
          set -euo pipefail
          rid="${{ matrix.rid }}"; version="${{ needs.verify.outputs.version }}"
          mkdir -p artifacts/release

          _tar() {
            local src="$1" dst="$2"
            if [[ "$rid" == windows-* ]]; then
              tar -C "artifacts/packages/$src" -a -cf "artifacts/release/${dst}.zip" .
            else
              tar -C "artifacts/packages/$src" -czf "artifacts/release/${dst}.tar.gz" .
            fi
          }
          # rid → workload name (ios/android/wasm); "" for desktop.
          _wl_of() {
            case "$1" in
              ios-*|iossim-*) echo ios ;;
              android-*)      echo android ;;
              browser-wasm)   echo wasm ;;
              *)              echo "" ;;
            esac
          }
          # The single RID per platform that ships the (identical across ABIs/slices)
          # workload tooling archive — avoids same-name artifact collisions at merge.
          _is_primary() { case "$1" in ios-arm64|android-arm64|browser-wasm) return 0 ;; *) return 1 ;; esac; }

          if [[ "$rid" == linux-* || "$rid" == macos-* || "$rid" == windows-* ]]; then
            # Desktop: SDK archive (full) + runtime archive (z42vm + libs only).
            _tar "z42-${version}-${rid}-release" "z42-${version}-${rid}"
            echo "✓ sdk: z42-${version}-${rid}"
            _tar "z42-runtime-${version}-${rid}" "z42-runtime-${version}-${rid}"
            echo "✓ runtime: z42-runtime-${version}-${rid}"
          else
            # Platform RID (ios/android/wasm) — runtime/workload split (B2-3/B2-4):
            #   runtime pack (per RID): z42-runtime-<v>-<rid>/  → z42-runtime-<v>-<rid>
            #   workload tooling (primary RID only, identical across ABIs/slices):
            #     z42-<v>-<rid>-release/ → z42-<v>-<wl>
            _tar "z42-runtime-${version}-${rid}" "z42-runtime-${version}-${rid}"
            echo "✓ runtime: z42-runtime-${version}-${rid}"
            if _is_primary "$rid"; then
              wl="$(_wl_of "$rid")"
              _tar "z42-${version}-${rid}-release" "z42-${version}-${wl}"
              echo "✓ workload: z42-${version}-${wl}"
            fi
          fi

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: artifacts/release/z42-*
          retention-days: 7
          if-no-files-found: error

  # ── 3. Publish GitHub Release with all 9 archives + SHA256SUMS ─────────
  publish:
    name: publish
    needs: [verify, package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: 'release-*'
          merge-multiple: true

      - name: List archives
        run: ls -la dist/

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          ( cd dist && shasum -a 256 z42-*.tar.gz z42-*.zip 2>/dev/null | sort -k2 ) > dist/SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat dist/SHA256SUMS

      - name: Generate release-index.json
        shell: bash
        run: |
          set -euo pipefail
          v="${{ needs.verify.outputs.version }}"
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          get_sha() { grep " $1$" dist/SHA256SUMS | awk '{print $1}'; }

          # Desktop: sdk (z42c+vm+libs+...) + runtime (vm+libs)
          sha_sdk_lx64="$(get_sha  "z42-${v}-linux-x64.tar.gz")"
          sha_rt_lx64="$(get_sha   "z42-runtime-${v}-linux-x64.tar.gz")"
          sha_sdk_la64="$(get_sha  "z42-${v}-linux-arm64.tar.gz")"
          sha_rt_la64="$(get_sha   "z42-runtime-${v}-linux-arm64.tar.gz")"
          sha_sdk_mac="$(get_sha   "z42-${v}-macos-arm64.tar.gz")"
          sha_rt_mac="$(get_sha    "z42-runtime-${v}-macos-arm64.tar.gz")"
          sha_sdk_win="$(get_sha   "z42-${v}-windows-x64.zip")"
          sha_rt_win="$(get_sha    "z42-runtime-${v}-windows-x64.zip")"

          # Platform runtime packs (per RID).
          sha_ios="$(get_sha    "z42-runtime-${v}-ios-arm64.tar.gz")"
          sha_iossim="$(get_sha "z42-runtime-${v}-iossim-arm64.tar.gz")"
          sha_aarm64="$(get_sha "z42-runtime-${v}-android-arm64.tar.gz")"
          sha_ax64="$(get_sha   "z42-runtime-${v}-android-x64.tar.gz")"
          sha_wasm="$(get_sha   "z42-runtime-${v}-browser-wasm.tar.gz")"

          # Workload tooling archives (one per platform; bundle the per-RID runtime packs).
          sha_wl_ios="$(get_sha     "z42-${v}-ios.tar.gz")"
          sha_wl_android="$(get_sha "z42-${v}-android.tar.gz")"
          sha_wl_wasm="$(get_sha    "z42-${v}-wasm.tar.gz")"

          for var in sha_sdk_lx64 sha_rt_lx64 \
                     sha_sdk_la64 sha_rt_la64 \
                     sha_sdk_mac  sha_rt_mac  \
                     sha_sdk_win  sha_rt_win  \
                     sha_ios sha_iossim sha_aarm64 sha_ax64 sha_wasm \
                     sha_wl_ios sha_wl_android sha_wl_wasm; do
            [ -n "${!var}" ] || { echo "release-index: missing sha256 for $var" >&2; exit 1; }
          done

          jq -n \
            --argjson schema 1 \
            --arg version "$v" --arg tag "v$v" --arg published "$ts" \
            --arg sha_sdk_lx64  "$sha_sdk_lx64"  --arg sha_rt_lx64  "$sha_rt_lx64"  \
            --arg sha_sdk_la64  "$sha_sdk_la64"  --arg sha_rt_la64  "$sha_rt_la64"  \
            --arg sha_sdk_mac   "$sha_sdk_mac"   --arg sha_rt_mac   "$sha_rt_mac"   \
            --arg sha_sdk_win   "$sha_sdk_win"   --arg sha_rt_win   "$sha_rt_win"   \
            --arg sha_ios      "$sha_ios"      --arg sha_iossim    "$sha_iossim"    \
            --arg sha_aarm64   "$sha_aarm64"   --arg sha_ax64      "$sha_ax64"      \
            --arg sha_wasm     "$sha_wasm"     \
            --arg sha_wl_ios   "$sha_wl_ios"   --arg sha_wl_android "$sha_wl_android" \
            --arg sha_wl_wasm  "$sha_wl_wasm"  \
            '{
              schema: $schema,
              version: $version,
              channel: "stable",
              tag: $tag,
              published: $published,
              runtimes: {
                "linux-x64": {
                  sdk:     { archive: ("z42-" + $version + "-linux-x64.tar.gz"),         sha256: $sha_sdk_lx64 },
                  runtime: { archive: ("z42-runtime-" + $version + "-linux-x64.tar.gz"), sha256: $sha_rt_lx64 }
                },
                "linux-arm64": {
                  sdk:     { archive: ("z42-" + $version + "-linux-arm64.tar.gz"),         sha256: $sha_sdk_la64 },
                  runtime: { archive: ("z42-runtime-" + $version + "-linux-arm64.tar.gz"), sha256: $sha_rt_la64 }
                },
                "macos-arm64": {
                  sdk:     { archive: ("z42-" + $version + "-macos-arm64.tar.gz"),         sha256: $sha_sdk_mac },
                  runtime: { archive: ("z42-runtime-" + $version + "-macos-arm64.tar.gz"), sha256: $sha_rt_mac }
                },
                "windows-x64": {
                  sdk:     { archive: ("z42-" + $version + "-windows-x64.zip"),             sha256: $sha_sdk_win },
                  runtime: { archive: ("z42-runtime-" + $version + "-windows-x64.zip"),     sha256: $sha_rt_win }
                },
                "ios-arm64":    { runtime: { archive: ("z42-runtime-" + $version + "-ios-arm64.tar.gz"),    sha256: $sha_ios    } },
                "iossim-arm64": { runtime: { archive: ("z42-runtime-" + $version + "-iossim-arm64.tar.gz"), sha256: $sha_iossim } },
                "android-arm64":{ runtime: { archive: ("z42-runtime-" + $version + "-android-arm64.tar.gz"),sha256: $sha_aarm64 } },
                "android-x64":  { runtime: { archive: ("z42-runtime-" + $version + "-android-x64.tar.gz"), sha256: $sha_ax64   } },
                "browser-wasm": { runtime: { archive: ("z42-runtime-" + $version + "-browser-wasm.tar.gz"), sha256: $sha_wasm  } }
              },
              workloads: {
                "ios":     { archive: ("z42-" + $version + "-ios.tar.gz"),     sha256: $sha_wl_ios,     runtimes: ["ios-arm64","iossim-arm64"] },
                "android": { archive: ("z42-" + $version + "-android.tar.gz"), sha256: $sha_wl_android, runtimes: ["android-arm64","android-x64"] },
                "wasm":    { archive: ("z42-" + $version + "-wasm.tar.gz"),    sha256: $sha_wl_wasm,    runtimes: ["browser-wasm"] }
              }
            }' > dist/release-index.json
          echo "--- release-index.json ---"
          cat dist/release-index.json

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          v="${{ needs.verify.outputs.version }}"
          # Prerelease if version contains '-' (e.g. -rc1) OR is strictly < 1.0.0.
          prerelease_flag=""
          if [[ "$v" == *-* ]]; then
            prerelease_flag="--prerelease"
          elif [ "$v" != "1.0.0" ] \
            && [ "$(printf '%s\n1.0.0\n' "$v" | sort -V | head -1)" = "$v" ]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "v$v" $prerelease_flag --generate-notes \
            --title "z42 v$v" \
            dist/SHA256SUMS dist/release-index.json dist/z42-*
