# z42c.core 诊断地基单测（port-z42c-core increment 1b）。
# kind=lib（runner 按 [Test] 方法逐个 fork z42vm，不需 Main）；z42.test 是 stdlib，
# 自动可用、不声明（避免 WS013）。经 `build <此 toml>` + z42-test-runner 运行。
[project]
name    = "z42c.core.test.diag"
version = "0.1.0"
kind    = "lib"

# 测试源与 toml 同目录（非 src/ 子树），显式 glob。
[sources]
include = ["**/*.z42"]

[dependencies]
"z42c.core" = "0.1.0"
