# z42c byte-identical .zbc writer 单测（port-z42c-zbc-writer ZW-1A）。
# 源 → IrGen → ZbcWriter → 小写 hex，对 src/tests/zbc-format/ ground-truth golden 逐字节。
[project]
name    = "z42c.semantics.test.zbc"
version = "0.1.0"
kind    = "lib"

[sources]
include = ["**/*.z42"]

[dependencies]
"z42c.semantics" = "0.1.0"
"z42c.syntax"    = "0.1.0"
"z42c.core"      = "0.1.0"
"z42c.ir"        = "0.1.0"

[build]
# Build output → artifacts mirror (mirror-build-output-per-component, 2026-06-16):
# src/z42c/z42c.semantics/tests/zbc → artifacts/build/z42c/z42c.semantics/tests/zbc (no src pollution).
output_dir = "../../../../../artifacts/build/z42c/z42c.semantics/tests/zbc"
