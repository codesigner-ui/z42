# z42c zpkg builder/writer 单测（port-z42c-zpkg-build BP-5）。
[project]
name    = "z42c.project.test.zpkg"
version = "0.1.0"
kind    = "lib"

[sources]
include = ["**/*.z42"]

[dependencies]
"z42c.project" = "0.1.0"
"z42c.ir"      = "0.1.0"

[build]
# Build output → artifacts mirror (mirror-build-output-per-component, 2026-06-16):
# src/z42c/z42c.project/tests/zpkg → artifacts/build/z42c/z42c.project/tests/zpkg (no src pollution).
output_dir = "../../../../../artifacts/build/z42c/z42c.project/tests/zpkg"
