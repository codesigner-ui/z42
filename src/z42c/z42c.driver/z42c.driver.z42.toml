# z42c.driver — 镜像 C# z42.Driver（CLI 入口；命令路由）。唯一 exe 子包。
# 用户入口 z42c = z42c.driver.zpkg。B0 骨架：无桥接 banner（不实现任何命令、
# 绝不 fallback 到 dotnet z42c.dll）。命令逐子版本解锁（lex/parse 0.3.4；build 0.3.9）。
[project]
name    = "z42c.driver"
version = "0.1.0"
kind    = "exe"
# entry 省略 —— z42c 自动检测唯一 Main()（Z42.Driver.Main）。
pack    = true

[dependencies]
"z42c.pipeline" = "0.1.0"
"z42c.ir"       = "0.1.0"
"z42c.core"     = "0.1.0"
