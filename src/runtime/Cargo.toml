[workspace]
members = [".", "crates/z42-abi", "crates/z42-rs", "crates/z42-macros"]

[package]
name = "z42_vm"
version = "0.1.0"
edition = "2021"
description = "z42 virtual machine — interpreter, JIT, and AOT backends"

[[bin]]
name = "z42vm"
path = "src/main.rs"

[lib]
name = "z42_vm"
path = "src/lib.rs"

[build-dependencies]
cc = "1"

[dependencies]
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"   # JSON interchange format (legacy .z42ir.json)
toml = "0.8"       # z42.toml project manifest format
bincode = "1"      # compact binary format (.zbc)

# Error handling
anyhow = "1"
thiserror = "1"

# CLI
clap = { version = "4", features = ["derive"] }

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Native interop — Tier 1 ABI runtime (spec C2)
# Use system libffi (avoids libffi-sys's bundled build that breaks on macOS arm64
# with newer Xcode toolchain). pkg-config must be able to find libffi (homebrew /
# apt install libffi-dev / etc). Enable "bundled" feature instead if that fails.
libffi     = { version = "3.2", features = ["system"] }
libloading = "0.8"
z42-abi    = { path = "crates/z42-abi" }

# JIT backend — Cranelift
cranelift-codegen = { version = "0.115", features = ["unwind"] }
cranelift-frontend = "0.115"
cranelift-jit      = "0.115"
cranelift-module   = "0.115"
cranelift-native   = "0.115"

[dev-dependencies]
jsonschema = { version = "0.20", default-features = false }
z42-rs     = { path = "crates/z42-rs" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
