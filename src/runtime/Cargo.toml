[package]
name = "z42_vm"
version = "0.1.0"
edition = "2021"
description = "z42 virtual machine — interpreter, JIT, and AOT backends"

[[bin]]
name = "z42vm"
path = "src/main.rs"

[lib]
name = "z42_vm"
path = "src/lib.rs"

[dependencies]
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"   # Phase 1: JSON interchange format (.z42ir.json)
toml = "0.8"       # .z42proj / .z42sln project manifest format
bincode = "1"      # Phase 2: compact binary format (.z42bc)

# Error handling
anyhow = "1"
thiserror = "1"

# CLI
clap = { version = "4", features = ["derive"] }

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# JIT backend — Cranelift
cranelift-codegen = { version = "0.115", features = ["unwind"] }
cranelift-frontend = "0.115"
cranelift-jit      = "0.115"
cranelift-module   = "0.115"
cranelift-native   = "0.115"

[dev-dependencies]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
