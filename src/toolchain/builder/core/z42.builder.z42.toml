# z42b — reflective [Test]/[Benchmark] host + desktop publish. Compiled to
# z42.builder.zpkg (Exe-mode). xtask spawns it via z42vm to run a compiled
# test/bench artifact (replacing the retired Rust z42-test-runner); the launcher
# forwards `z42 test`/`z42 bench`/`z42 publish` here.
#
# SCOPE: test/bench (builder_test) + desktop publish (builder_publish +
# builder_apphost, move-publish-to-z42b). publish produces the apphost (inlined
# patcher, NOT z42.workload.desktop — z42b must stay stdlib-only to build in the
# test-runner stage) around an already-built zpkg + optional build-if-needed via
# z42c — it does NOT use the in-process compiler API and does NOT import
# Z42.Build / Z42.Build.Project, so it is safe to wire now. The build/export/new
# orchestration verbs still live in the PARKED builder.z42 / builder_commands.z42 /
# builder_new.z42 (they import Z42.Build.Project + need the in-process compiler
# API) — wired by `wire-z42b-host-build`.
# (z42.project 仍暂不入 build：其 `Z42.Build.Project` 类与 z42c.project 同名，同 flat libs
# 会按文件名 first-wins 串味、炸 z42c 自举——见 z42.workspace.toml 注释。publish 不碰
# z42.project，故不受影响。等 wire-z42b-host-build 让 z42c 改引用本库、删 z42c.project 后再启用。)
[project]
name    = "z42.builder"
version = "0.1.0"
kind    = "exe"
entry   = "Z42Builder.Main"
pack    = true

[sources]
include = ["builder_cli.z42", "builder_test.z42", "builder_publish.z42", "builder_apphost.z42"]

[dependencies]
# stdlib-only — z42b doubles as the reflective test-runner, which the `stdlib [Test]`
# build stage compiles with ONLY stdlib in Z42_LIBS. publish therefore inlines its
# apphost patcher (builder_apphost.z42) rather than depending on z42.workload.desktop.
"z42.core" = "0.1.0"   # String / core / Platform
"z42.io"   = "0.1.0"   # Console / File / Directory / Path / Process / Environment
"z42.cli"  = "0.1.0"   # Std.Cli nested router + ArgParser
"z42.test" = "0.1.0"   # Std.Test.Runner.RunModule — reflective [Test]/[Benchmark] runner
"z42.toml" = "0.1.0"   # TomlValue.Parse — read [platform.desktop] in `z42b publish` (move-publish-to-z42b)

[build]
# Mirror launcher: emit z42.builder.zpkg into the shared artifacts tree
# (artifacts/build/toolchain/builder), parallel to src/toolchain/builder.
# From this toml's dir (src/toolchain/builder/core) up 4 levels to repo root.
dist_dir = "../../../../artifacts/build/toolchain/builder"

[profile.release]
mode     = "interp"
optimize = 2

# apphost-as-config: this binary publishes a native desktop apphost.
#   apphost = true  → gate（无此则 `z42 publish desktop` 不产 apphost）。
#   publish_dir 指仓库根（镜像 scripts/xtask.z42.toml 的 ".."）→ `z42 publish desktop`
#   产仓库根 `./z42b`（dev 便捷入口，同 ./xtask）。从本 toml 目录 src/toolchain/builder/core
#   上溯 4 级到仓库根。
[platform.desktop]
apphost     = true
publish_dir = "../../../.."
