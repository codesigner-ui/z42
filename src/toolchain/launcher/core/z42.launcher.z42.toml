# z42 launcher core — z42 program compiled to launcher.zpkg (Exe-mode).
# The native trampoline (../src) runs this via the bundled launcher runtime.
[project]
name    = "z42.launcher"
version = "0.1.0"
kind    = "exe"
entry   = "Z42Launcher.Main"
pack    = true

[sources]
include = ["*.z42"]

[dependencies]
"z42.core"        = "0.1.0"   # String / Console-adjacent core
"z42.io"          = "0.1.0"   # Environment / Directory / Path / File / Process / Console / Platform
"z42.json"        = "0.1.0"   # parse <app>.runtimeconfig.json
"z42.net"         = "0.1.0"   # HttpClient — download release assets
"z42.compression" = "0.1.0"   # Gzip + Tar — unpack .tar.gz
"z42.crypto"      = "0.1.0"   # Sha256 — verify against SHA256SUMS
"z42.encoding"    = "0.1.0"   # Utf8.GetBytes — patch apphost placeholder
"z42.toml"        = "0.1.0"   # read [platform.desktop].publish_dir in `publish desktop <toml>`
"z42.cli"         = "0.1.0"   # Std.Cli nested router + ArgParser (command parsing)
"z42.workload.desktop" = "0.1.0"   # desktop publish: Z42.Workload.Desktop.Apphost.Produce (workload-owned)
"z42.workload.ios"     = "0.1.0"   # iOS export: Z42.Workload.Ios.IosExport.Generate (workload-owned)
"z42.workload.android" = "0.1.0"   # Android export: Z42.Workload.Android.AndroidExport.Generate
"z42.workload.wasm"    = "0.1.0"   # WASM export: Z42.Workload.Wasm.WasmExport.Generate

[build]
# reorg-artifacts-layout (2026-06-04): emit launcher.zpkg into the shared
# artifacts tree (mirrors src/toolchain/launcher) instead of a dist/ dir
# inside src/. Relative from this toml's dir (src/toolchain/launcher/core)
# up 4 levels to the repo root, then into artifacts/build/toolchain/launcher.
# restructure-build-output-dirs (2026-06-06): legacy flat layout — set
# dist_dir directly (no nested dist/ subdir). cache_dir / output_dir
# stay defaulted (cache lands beside the dist by default).
dist_dir = "../../../../artifacts/build/toolchain/launcher"

[profile.release]
mode     = "interp"
optimize = 2

# apphost-as-config: this binary publishes a native desktop apphost.
#   apphost = true  → gate（无此则 `z42 publish desktop` 不产 apphost）。
#   publish_dir 缺省 = 项目目录（仅输出位置，非 gate）。
#   bin/payload（add-package-layout-config）：根 launcher 特例——bin 落部署根 `z42`。
[platform.desktop]
apphost = true
bin     = "z42"
payload = "programs/launcher/launcher.zpkg"
