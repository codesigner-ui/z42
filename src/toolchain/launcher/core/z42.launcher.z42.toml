# z42 launcher core — z42 program compiled to launcher.zpkg (Exe-mode).
# The native trampoline (../src) runs this via the bundled launcher runtime.
[project]
name    = "z42.launcher"
version = "0.1.0"
kind    = "exe"
entry   = "Z42Launcher.Main"
pack    = true

[sources]
include = ["*.z42"]

[dependencies]
"z42.core"        = "0.1.0"   # String / Console-adjacent core
"z42.io"          = "0.1.0"   # Environment / Directory / Path / File / Process / Console / Platform
"z42.json"        = "0.1.0"   # parse <app>.runtimeconfig.json
"z42.net"         = "0.1.0"   # HttpClient — download release assets
"z42.compression" = "0.1.0"   # Gzip + Tar — unpack .tar.gz
"z42.crypto"      = "0.1.0"   # Sha256 — verify against SHA256SUMS

[build]
# reorg-artifacts-layout (2026-06-04): emit launcher.zpkg into the shared
# artifacts tree (mirrors src/toolchain/launcher) instead of a dist/ dir
# inside src/. Relative from this toml's dir (src/toolchain/launcher/core)
# up 4 levels to the repo root, then into artifacts/build/toolchain/launcher.
out_dir = "../../../../artifacts/build/toolchain/launcher"

[profile.release]
mode     = "interp"
optimize = 2
