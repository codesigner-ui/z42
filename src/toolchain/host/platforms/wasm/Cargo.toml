[package]
name = "z42-platform-wasm"
version = "0.1.0"
edition = "2021"
description = "Tier 3 WebAssembly facade for the z42 embedding API."
publish = false

[lib]
name = "z42_wasm"
path = "src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
# z42-host crate gives us the Tier 2 Host API. z42 has to be a direct
# dep too because Tier 1 types live there and the wasm crate re-borrows
# them (ZpkgResolver trait, Z42HostStatus).
z42   = { path = "../../../../runtime", default-features = false, features = ["wasm"] }
z42-host = { path = "../../../workload/host-api" }
z42-abi  = { path = "../../../../runtime/crates/z42-abi" }

wasm-bindgen = "0.2"
js-sys       = "0.3"

[profile.release]
# Smaller wasm binary; matches typical wasm-bindgen recommendation.
opt-level = "z"
lto       = true
codegen-units = 1
