[package]
name = "z42-platform-ios"
version = "0.1.0"
edition = "2021"
description = "Tier 3 iOS facade for the z42 embedding API — staticlib + rlib re-exporting z42_host_* into Swift via clang module."
publish = false

[lib]
name = "z42_platform_ios"
path = "src/lib.rs"
crate-type = ["staticlib", "rlib"]

[dependencies]
# Tier 2 ergonomic API plus the Tier 1 ABI symbols (z42_host_*) live in
# the runtime crate. iOS feature preset = ["interp-only", "aot",
# "native-interop"] — App Store policy bans JIT but allows dlopen +
# libffi, so native-interop stays on.
z42      = { path = "../../../../../runtime", default-features = false, features = ["ios"] }
z42-host = { path = "../../../embed" }

[profile.release]
opt-level = "z"
lto       = true
codegen-units = 1
strip     = true
