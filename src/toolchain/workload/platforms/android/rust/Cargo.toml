[package]
name = "z42-platform-android"
version = "0.1.0"
edition = "2021"
description = "Tier 3 Android facade for the z42 embedding API — cdylib re-exporting z42_host_* into Kotlin via a JNI bridge (cpp/z42vm_jni.c)."
publish = false

[lib]
name = "z42_platform_android"
path = "src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
# Android feature preset = ["interp-only", "aot", "native-interop"].
# Bundled libffi 5.1 (libffi-sys 4.1) compiles cleanly for all four
# Android ABIs out of the NDK; the older 2.3 snapshot's `sysv.S` CFI
# issue is fixed in libffi 3.4.7 which ships inside libffi-sys 4.1.
z42      = { path = "../../../../../runtime", default-features = false, features = ["android"] }
z42-host = { path = "../../../../../runtime/crates/z42-host" }

[profile.release]
opt-level = "z"
lto       = true
codegen-units = 1
strip     = true
