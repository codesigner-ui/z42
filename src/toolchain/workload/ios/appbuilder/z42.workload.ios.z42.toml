# iOS workload — z42 build logic (Xcode project export). Real workload z42 package;
# the launcher depends on it so `z42 export ios` calls Z42.Workload.Ios.IosExport.Generate.
# (platform-workload-packages, 2026-06-18)
[project]
name    = "z42.workload.ios"
version = "0.1.0"
kind    = "lib"

[sources]
# Only the export logic. iOSWorkload.z42 (future z42.build pipeline handler) is
# parked — it imports the not-yet-compiled z42.build — so it is excluded here.
include = ["export.z42"]

[dependencies]
"z42.core" = "0.1.0"
"z42.io"   = "0.1.0"

[build]
# Emit the .zpkg into the shared libs dir (== launcher build's Z42_LIBS).
dist_dir = "../../../../../artifacts/build/libraries/dist/release"
