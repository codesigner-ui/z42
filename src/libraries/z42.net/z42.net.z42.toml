[project]
name    = "z42.net"
version = "0.1.0"
kind    = "lib"

[dependencies]
"z42.core"     = "0.1.0"
"z42.io"       = "0.1.0"   # Std.IO.Stream base class for NetworkStream
"z42.encoding" = "0.1.0"   # Base64 for WebSocket Sec-WebSocket-Key (K4)
"z42.random"   = "0.1.0"   # Random for WS Sec-WebSocket-Key + frame mask (K4)
"z42.crypto"   = "0.1.0"   # Sha1 for WS Sec-WebSocket-Accept validation (K4 accept-validate, 2026-05-25)
"z42.threading" = "0.1.0"  # Thread for HttpServer.ServeThreaded thread-per-accept (2026-05-26)
"z42.compression" = "0.1.0" # Gzip.Decompress for HttpClient.SetAutoDecompress (2026-05-27)
