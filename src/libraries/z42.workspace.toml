# z42 标准库 workspace
#
# 6 个 stdlib 包作为 workspace member 集中编译；产物与 cache 落到
# artifacts/build/libraries/<member>/<profile>/{dist,cache}/，按 build profile 分级。
#
# 使用：
#   cd src/libraries && z42c build --workspace --release
#   产物：artifacts/build/libraries/z42.core/release/dist/z42.core.zpkg
#   cache：artifacts/build/libraries/z42.core/release/cache/<file>.zbc
#
# stdlib 互相依赖（z42.collections → z42.core 等）通过编译器的 libsDirs
# 自动发现：BuildLibsDirs 在 artifacts/build/libraries/ 下搜索每个 member
# 的 dist 子目录，stdlib 编译时各 member 能找到先前编译的产物。
#
# Spec: docs/spec/archive/2026-05-12-redesign-artifact-layout/

[workspace]
members = ["*"]
# Topologically ordered (declared order must respect deps even though z42c
# also runs a topo-sort, in case a build path falls back to literal order):
#   z42.core       → (no deps)
#   z42.collections / encoding / math / text / time / toml → (need core only)
#   z42.random     → (needs z42.time for wall-clock default seed)
#   z42.io         → (needs z42.time for Std.Process.Timeout/TimeSpan)
#   z42.json       → (needs z42.text for StringBuilder)
#   z42.test       → (needs z42.io for Bencher.Std.IO.Console)
default-members = [
    "z42.core",
    "z42.collections",
    "z42.encoding",
    "z42.math",
    "z42.text",
    "z42.time",
    "z42.toml",
    "z42.random",
    "z42.uri",
    "z42.threading",
    "z42.io",
    "z42.io.binary",
    "z42.diagnostics",
    "z42.regex",
    "z42.cli",
    "z42.json",
    "z42.crypto",
    "z42.compression",
    "z42.yaml",
    "z42.net",
    "z42.numerics",
    "z42.test",
]

[workspace.project]
version = "0.1.0"
license = "MIT"

[workspace.build]
# 产物按 build profile 分级：
# 例：artifacts/build/libraries/z42.core/release/dist/z42.core.zpkg
#     artifacts/build/libraries/z42.core/release/cache/<file>.zbc
# package.sh 把 <member>/<profile>/dist/<name>.zpkg 复制到 packages/<pkg>/libs/。
# restructure-build-output-dirs (2026-06-06): three independent dir fields;
# output_dir set explicitly so cache/dist 都派生自同一前缀，且 dist 加上
# 额外的 "dist" 后缀维持旧布局（${output_dir}/dist 是默认 — 故省略
# dist_dir 等同于显式 ${output_dir}/dist）。
output_dir = "../../artifacts/build/libraries/${member_name}/${profile}"
cache_dir  = "../../artifacts/build/libraries/${member_name}/${profile}/cache"
