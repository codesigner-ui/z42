# z42c.driver — 镜像 C# z42.Driver（CLI 入口；命令路由）。唯一 exe 子包。
# 用户入口 z42c = z42c.driver.zpkg。绝不 fallback 到 dotnet z42c.dll。
# 命令逐子版本解锁：lex/parse（--dump-tokens/--dump-ast，incr 6e-1）已实现；build 待后端。
[project]
name    = "z42c.driver"
version = "0.1.0"
kind    = "exe"
# entry 省略 —— z42c 自动检测唯一 Main()（Z42.Driver.Main）。
pack    = true

[dependencies]
"z42c.syntax"    = "0.1.0"
"z42c.semantics" = "0.1.0"
"z42c.core"      = "0.1.0"
"z42c.project"   = "0.1.0"   # build：manifest/源发现/zpkg 组装+写出
"z42c.ir"        = "0.1.0"   # IrModule（build 编译产物流转；镜像 C# driver→ir 边）
"z42.io"         = "0.1.0"
"z42c.pipeline"  = "0.1.0"   # DepScan（CI-4；镜像 C# driver→pipeline 边）

# apphost-as-config: this binary publishes a native desktop apphost.
#   apphost = true  → gate（无此则 `z42 publish desktop` 不产 apphost）。
#   publish_dir 缺省 = 项目目录（仅输出位置，非 gate）。
#   bin/payload（add-package-layout-config）：镜像现状布局；6 个 workspace 兄弟库
#   （见上 [dependencies]）由 publish 自动依赖打包，与本 payload 同目录。
[platform.desktop]
apphost = true
bin     = "bin/z42c"
payload = "programs/z42c/z42c.driver.zpkg"
