# z42c.semantics TypeChecker 单测（port-z42c-semantics 1A-4b）。
[project]
name    = "z42c.semantics.test.typecheck"
version = "0.1.0"
kind    = "lib"

[sources]
include = ["**/*.z42"]

[dependencies]
"z42c.semantics" = "0.1.0"
"z42c.syntax"    = "0.1.0"
"z42c.core"      = "0.1.0"

[build]
# Build output → artifacts mirror (mirror-build-output-per-component, 2026-06-16):
# src/compiler/z42c.semantics/tests/typecheck → artifacts/build/z42c/z42c.semantics/tests/typecheck (no src pollution).
output_dir = "../../../../../artifacts/build/z42c/z42c.semantics/tests/typecheck"
