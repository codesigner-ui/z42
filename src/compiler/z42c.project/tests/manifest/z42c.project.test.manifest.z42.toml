# z42c.project ManifestLoader 单测（port-z42c-project increment 1）。
[project]
name    = "z42c.project.test.manifest"
version = "0.1.0"
kind    = "lib"

[sources]
include = ["**/*.z42"]

[dependencies]
"z42c.project" = "0.1.0"
"z42c.core"    = "0.1.0"

[build]
# Build output → artifacts mirror (mirror-build-output-per-component, 2026-06-16):
# src/compiler/z42c.project/tests/manifest → artifacts/build/z42c/z42c.project/tests/manifest (no src pollution).
output_dir = "../../../../../artifacts/build/z42c/z42c.project/tests/manifest"
