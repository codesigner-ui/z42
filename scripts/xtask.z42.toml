# xtask — z42 repo dev CLI (add-xtask-cli, 2026-06-04).
# Built to an Exe-zpkg, run via the launcher: `z42 xtask.zpkg <command> [args]`.
[project]
name    = "xtask"
version = "0.1.0"
kind    = "exe"
# `entry` omitted — z42c auto-detects the only `Main()` (Z42Xtask.Main).
pack    = true

[sources]
include = ["**/*.z42"]

[dependencies]
"z42.core"  = "0.1.0"   # String / Console
"z42.io"    = "0.1.0"   # Environment / Process / File / Directory / Path
"z42.toml"  = "0.1.0"   # versions.toml read (xtask_package)
"z42.json"  = "0.1.0"   # hyperfine result merge (xtask_bench)
"z42.regex" = "0.1.0"   # using-audit heuristics (xtask_audit)
"z42.cli"   = "0.1.0"   # Std.Cli nested router + ArgParser (command parsing)

[build]
# xtask is the build DRIVER, so its output lives at artifacts/xtask — NOT under
# artifacts/build/ (which is where the things xtask builds go). output_dir is
# projectDir-relative; dist_dir / cache_dir are output_dir-relative (resolved
# against output_dir by CentralizedBuildLayout), so they use the ${output_dir}
# template — writing "../artifacts/xtask" here would double to
# artifacts/artifacts/xtask. dist_dir = ${output_dir} keeps the flat
# "artifacts/xtask/xtask.zpkg" layout instead of "${output_dir}/dist/...".
output_dir = "../artifacts/xtask"
dist_dir   = "${output_dir}"
cache_dir  = "${output_dir}/.cache"

[profile.release]
mode     = "interp"
optimize = 2

# apphost-as-config (2026-06-17): `z42 publish desktop scripts/xtask.z42.toml`
# reads [platform.desktop] and emits a native `./xtask` apphost that runs the
# built xtask.zpkg directly. z42c does NOT consume this section — it's read by
# the desktop export patcher only.
#   apphost = true  → the gate: only then does publish emit an apphost.
#   publish_dir     → output LOCATION only (project-dir-relative; ".." = repo root,
#                     this toml lives in scripts/). Not the gate.
[platform.desktop]
apphost     = true
publish_dir = ".."
