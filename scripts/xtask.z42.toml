# xtask — z42 repo dev CLI (add-xtask-cli, 2026-06-04).
# Built to an Exe-zpkg, run via the launcher: `z42 xtask.zpkg <command> [args]`.
[project]
name    = "xtask"
version = "0.1.0"
kind    = "exe"
# `entry` omitted — z42c auto-detects the only `Main()` (Z42Xtask.Main).
pack    = true

[sources]
include = ["xtask.z42", "xtask_common.z42", "xtask_stdlib.z42", "xtask_versions.z42", "xtask_test.z42", "xtask_test_vm.z42", "xtask_test_cross.z42", "xtask_test_dist.z42", "xtask_test_changed.z42", "xtask_package.z42", "xtask_bench.z42", "xtask_install.z42", "xtask_install_android.z42", "xtask_package_ios.z42", "xtask_package_android.z42", "xtask_package_wasm.z42", "xtask_audit.z42", "xtask_deps.z42", "xtask_golden.z42", "xtask_regen.z42"]

[dependencies]
"z42.core"  = "0.1.0"   # String / Console
"z42.io"    = "0.1.0"   # Environment / Process / File / Directory / Path
"z42.toml"  = "0.1.0"   # versions.toml read (xtask_package)
"z42.json"  = "0.1.0"   # hyperfine result merge (xtask_bench)
"z42.regex" = "0.1.0"   # using-audit heuristics (xtask_audit)

[build]
# xtask is the build DRIVER, so its output lives at artifacts/xtask — NOT under
# artifacts/build/ (which is where the things xtask builds go).
out_dir = "../artifacts/xtask"

[profile.release]
mode     = "interp"
optimize = 2
