# Mini-project for launcher cutover (add-z42-launcher, 2026-06-03).
[project]
name    = "test-cross-zpkg"
version = "0.1.0"
kind    = "exe"
entry   = "Z42TestCrossZpkgScript.Main"
pack    = true
[sources]
include = ["test-cross-zpkg.z42"]
[dependencies]
"z42.core" = "0.1.0"
"z42.io"   = "0.1.0"
[build]
out_dir = "dist"
[profile.release]
mode = "interp"
optimize = 2
