# 演示 [policy] 强制策略 + [workspace.build] 集中产物。

[workspace]
members = ["libs/*"]

[workspace.project]
version = "0.1.0"

[workspace.build]
dist_dir = "dist/${profile}"     # 按 profile 派生（debug/release 各自子目录）
# output_dir 未设 → 默认 = workspace 根；cache_dir 未设 → ${output_dir}/.cache

[policy]
# 默认锁定 build.output_dir / build.cache_dir / build.dist_dir
# （无需显式声明 —— DefaultLockedPaths 在 PolicyEnforcer 里）。
# 显式锁定其他字段：所有 release 产物必须 strip
"profile.release.strip" = true
