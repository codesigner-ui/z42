# hello.z42.toml — Hello World demo project
# 演示 [[exe]] 多可执行目标写法
# name 省略，自动从文件名推断为 "hello"

[project]
version     = "0.1.0"
description = "Hello World demo"

[sources]
include = ["*.z42"]   # 所有 [[exe]] 默认共享此 glob

[[exe]]
name  = "hello"
entry = "Hello.Main"

# [[exe]]
# name  = "tool"
# entry = "Tool.Main"
# src   = ["tools/**/*.z42"]   # 可选：独立源文件集

[build]
# dist_dir / cache_dir / output_dir omitted → cascade defaults
# (output_dir = this dir; dist_dir = ${output_dir}/dist; cache_dir = ${output_dir}/.cache)

[profile.debug]
mode     = "interp"
optimize = 0
debug    = true

[profile.release]
mode     = "jit"
optimize = 3
strip    = true
