# 最小可用的 z42 workspace 示例。
#
# 演示：
#   - virtual manifest（无 [project] 段）
#   - members glob 展开 + default-members
#   - [workspace.project] 共享元数据
#   - [workspace.dependencies] 中央版本声明
#   - [workspace.build] 集中产物（占位；C3 落地集中布局）
#   - profile 集中声明
#
# 使用：
#   z42c info                    # 查看 workspace 概览（C4 落地）
#   z42c build --workspace       # 编译所有 members（C4 落地）
#   z42c build -p hello          # 仅编译 hello（C4 落地）

[workspace]
members         = ["libs/*", "apps/*"]
default-members = ["apps/hello"]
resolver        = "1"

[workspace.project]
version     = "0.1.0"
license     = "MIT"
authors     = ["z42 team"]
description = "z42 workspace-basic example"

[workspace.dependencies]
"greeter" = { path = "libs/greeter", version = "0.1.0" }

[workspace.build]
out_dir   = "dist"
cache_dir = ".cache"

[profile.debug]
mode  = "interp"
debug = true

[profile.release]
mode     = "jit"
optimize = 3
strip    = true
