# 综合示例：多 member + 跨 member 依赖（hello → utils → core）。

[workspace]
members         = ["libs/*", "apps/*"]
default-members = ["apps/hello"]

[workspace.project]
version = "0.1.0"
license = "MIT"

[workspace.dependencies]
"core"  = { path = "libs/core",  version = "0.1.0" }
"utils" = { path = "libs/utils", version = "0.1.0" }
